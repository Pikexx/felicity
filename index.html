<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Felicity's World</title>
<style>
/* ───────────────────────────────────────────────────
   RESET & BASE
─────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#1a0e0a;touch-action:none;
  user-select:none;-webkit-user-select:none;
  font-family:'Segoe UI',system-ui,sans-serif
}
#c{display:block;width:100%;height:100%;position:absolute;top:0;left:0}

/* ── HUD ──────────────────────────────────────── */
#hud{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:10
}
#title{
  position:absolute;top:16px;left:50%;
  transform:translateX(-50%);text-align:center;
  pointer-events:none
}
#title h1{
  font-size:clamp(12px,2.5vw,17px);font-weight:700;
  color:rgba(255,220,160,.92);letter-spacing:.22em;
  text-transform:uppercase;
  text-shadow:0 0 18px rgba(255,120,0,.4),0 2px 10px rgba(0,0,0,.7)
}
#title p{font-size:9px;color:rgba(255,200,120,.42);letter-spacing:.16em;margin-top:2px}

/* ── JOYSTICK ──────────────────────────────────── */
#jz{
  position:absolute;bottom:26px;left:26px;
  width:130px;height:130px;
  pointer-events:all;touch-action:none
}
/* nipplejs custom */
.nipple .front{background:rgba(255,220,180,.9)!important;box-shadow:0 2px 12px rgba(0,0,0,.3)!important}
.nipple .back{background:rgba(255,200,140,.18)!important;border:2px solid rgba(255,200,130,.4)!important}

/* ── CORNER INFO ───────────────────────────────── */
#info{
  position:absolute;bottom:22px;right:18px;
  text-align:right;font-size:9px;
  color:rgba(255,200,140,.3);letter-spacing:.06em;line-height:1.9
}

/* ── NAME LABELS ──────────────────────────────── */
.lbl{
  position:fixed;pointer-events:none;
  transform:translate(-50%,-100%);
  font-size:11px;font-weight:700;letter-spacing:.09em;
  padding:3px 10px;border-radius:12px;
  white-space:nowrap;text-shadow:0 1px 5px rgba(0,0,0,.9);
  z-index:7;backdrop-filter:blur(5px)
}
.lbl-f{background:rgba(255,90,150,.28);border:1px solid rgba(255,150,200,.55);color:#ffc8e8}
.lbl-c{background:rgba(60,130,255,.28);border:1px solid rgba(100,170,255,.55);color:#c0d8ff}

/* ── ENTER BUTTON ─────────────────────────────── */
#enter-btn{
  position:fixed;left:50%;top:52%;
  transform:translate(-50%,-50%);
  z-index:20;pointer-events:none;opacity:0;
  transition:opacity .25s ease,top .25s ease
}
#enter-btn.show{opacity:1;pointer-events:all;top:50%}
#enter-btn button{
  background:rgba(20,12,6,.84);backdrop-filter:blur(16px);
  color:rgba(255,220,160,.95);
  border:1px solid rgba(255,200,120,.25);
  border-radius:24px;padding:10px 22px;
  font-size:12px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;
  font-family:inherit;touch-action:manipulation;
  transition:background .15s,transform .1s,box-shadow .15s;
  box-shadow:0 4px 18px rgba(0,0,0,.45);white-space:nowrap
}
#enter-btn button:hover{background:rgba(40,22,10,.9);box-shadow:0 6px 24px rgba(0,0,0,.55)}
#enter-btn button:active{transform:scale(.93)}

/* ── EXIT BUTTON ──────────────────────────────── */
#exit-btn{
  position:fixed;top:13px;left:13px;z-index:60;
  background:rgba(20,12,6,.84);backdrop-filter:blur(14px);
  color:rgba(255,210,140,.9);
  border:1px solid rgba(255,190,100,.2);
  border-radius:22px;padding:8px 16px;
  font-size:11px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;cursor:pointer;
  font-family:inherit;display:none;touch-action:manipulation;
  transition:transform .1s
}
#exit-btn:active{transform:scale(.93)}

/* ── ACTION BUTTONS — clean cozy pill, no emojis ── */
#action-panel{
  position:fixed;right:14px;bottom:36px;
  z-index:20;display:flex;flex-direction:column;gap:7px;
  pointer-events:all
}
.act-btn{
  background:rgba(255,245,235,.13);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:rgba(255,230,205,.9);
  border:1px solid rgba(255,215,180,.28);
  border-radius:50px;
  padding:8px 18px;
  font-size:10.5px;font-weight:700;
  font-family:inherit;
  letter-spacing:.14em;
  text-transform:uppercase;
  cursor:pointer;touch-action:manipulation;
  white-space:nowrap;
  box-shadow:0 2px 12px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.07);
  transition:background .18s,box-shadow .18s,transform .08s,border-color .18s,color .18s;
  min-width:108px;
  text-align:center;
  display:flex;align-items:center;justify-content:center;gap:6px
}
.act-btn::before{
  content:'';display:inline-block;
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,200,150,.5);flex-shrink:0;
  transition:background .18s,box-shadow .18s
}
.act-btn:hover{
  background:rgba(255,235,215,.2);
  box-shadow:0 3px 16px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.1)
}
.act-btn:active{transform:scale(.94);box-shadow:0 1px 5px rgba(0,0,0,.22)}
.act-btn.active{
  background:rgba(255,185,110,.22);
  border-color:rgba(255,200,130,.5);
  color:rgba(255,248,225,.98);
  box-shadow:0 2px 14px rgba(210,110,0,.2),inset 0 1px 0 rgba(255,255,255,.1)
}
.act-btn.active::before{
  background:rgba(255,200,80,.9);
  box-shadow:0 0 6px rgba(255,180,50,.65)
}

/* ── INTERACTION TOAST (replaces emoji bubble) ─── */
#emote-bubble{
  position:fixed;left:50%;top:40%;
  transform:translate(-50%,-50%) scale(.85) translateY(6px);
  z-index:25;pointer-events:none;opacity:0;
  font-size:10px;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(255,235,200,.9);
  background:rgba(20,12,6,.72);
  border:1px solid rgba(255,200,130,.22);
  border-radius:50px;
  padding:6px 16px;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  white-space:nowrap;
  transition:opacity .3s ease,transform .35s cubic-bezier(.34,1.56,.64,1)
}
#emote-bubble.show{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0)}

/* ═══════════════════════════════════════════════════
   PLAY SCREEN — full-screen landing overlay
═══════════════════════════════════════════════════ */
#play-screen{
  position:fixed;inset:0;z-index:400;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(168deg,#0e0806 0%,#1c0f08 40%,#120a12 100%);
  transition:opacity .9s ease,visibility .9s ease
}
#play-screen.fade-out{opacity:0;visibility:hidden;pointer-events:none}

/* Decorative grain overlay */
#play-screen::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.35;pointer-events:none
}

/* Soft radial warm glow behind title */
#play-screen::after{
  content:'';position:absolute;
  width:420px;height:420px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(200,80,20,.12) 0%,transparent 70%);
  pointer-events:none
}

#play-title{
  position:relative;z-index:1;
  text-align:center;margin-bottom:52px
}
#play-title h1{
  font-size:clamp(22px,6vw,42px);
  font-weight:300;
  color:rgba(255,215,155,.92);
  letter-spacing:.35em;
  text-transform:uppercase;
  text-shadow:0 0 40px rgba(220,120,30,.3),0 2px 16px rgba(0,0,0,.8);
  margin-bottom:10px
}
#play-title p{
  font-size:clamp(9px,2vw,12px);
  color:rgba(255,190,120,.38);
  letter-spacing:.25em;
  text-transform:uppercase
}

/* Decorative line */
#play-title .divider{
  width:48px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,180,80,.45),transparent);
  margin:14px auto
}

#play-btn{
  position:relative;z-index:1;
  background:rgba(255,240,220,.08);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:rgba(255,225,185,.92);
  border:1px solid rgba(255,200,130,.3);
  border-radius:50px;
  padding:14px 44px;
  font-size:12px;font-weight:700;
  letter-spacing:.28em;text-transform:uppercase;
  font-family:inherit;
  cursor:pointer;touch-action:manipulation;
  box-shadow:0 0 0 0 rgba(255,160,60,0),0 4px 24px rgba(0,0,0,.45);
  transition:background .2s,border-color .2s,box-shadow .25s,transform .12s;
  outline:none
}
#play-btn:hover{
  background:rgba(255,230,195,.15);
  border-color:rgba(255,200,120,.52);
  box-shadow:0 0 0 4px rgba(255,160,60,.08),0 6px 28px rgba(0,0,0,.5)
}
#play-btn:active{transform:scale(.95)}
/* subtle breathing pulse on idle */
@keyframes pulse-border{
  0%,100%{box-shadow:0 0 0 0 rgba(255,160,60,0),0 4px 24px rgba(0,0,0,.45)}
  50%{box-shadow:0 0 0 6px rgba(255,160,60,.07),0 4px 24px rgba(0,0,0,.45)}
}
#play-btn{animation:pulse-border 3s ease-in-out infinite}

/* Small hint text below button */
#play-hint{
  position:relative;z-index:1;
  margin-top:22px;
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,180,100,.22)
}

/* ═══════════════════════════════════════════════════
   SCENE TRANSITION FADE
═══════════════════════════════════════════════════ */
#scene-fade{
  position:fixed;inset:0;z-index:200;
  background:#0e0806;
  opacity:0;pointer-events:none;
  transition:opacity .45s ease
}
#scene-fade.visible{opacity:1;pointer-events:all}

/* ── LOADING SCREEN ───────────────────────────── */
#ld{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#0e0806,#1a0e0a,#0a0e16);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;transition:opacity .7s ease
}
#ld.go{opacity:0;pointer-events:none}
#ld h2{
  color:rgba(255,210,140,.9);font-size:20px;font-weight:300;
  letter-spacing:.38em;text-transform:uppercase;margin-bottom:30px;
  text-shadow:0 0 30px rgba(255,160,60,.3)
}
.lb{width:190px;height:2px;background:rgba(255,180,80,.12);border-radius:2px;overflow:hidden}
.lf{height:100%;width:0%;background:linear-gradient(90deg,#d4640a,#f5b04a);border-radius:2px;transition:width .08s linear}
</style>
</head>
<body>

<!-- ═══════════════ PLAY SCREEN ═══════════════ -->
<div id="play-screen">
  <div id="play-title">
    <h1>Felicity's World</h1>
    <div class="divider"></div>
    <p>A peaceful place to wander</p>
  </div>
  <button id="play-btn">Play</button>
  <div id="play-hint">Touch to begin</div>
</div>

<!-- Scene transition fade overlay -->
<div id="scene-fade"></div>

<!-- Loading screen -->
<div id="ld">
  <h2>Felicity's World</h2>
  <div class="lb"><div class="lf" id="lbar"></div></div>
</div>

<!-- Canvas -->
<canvas id="c"></canvas>

<!-- Name labels -->
<div id="lbl-f" class="lbl lbl-f">Felicity</div>
<div id="lbl-c" class="lbl lbl-c">Chris</div>

<!-- Enter / exit house -->
<div id="enter-btn"><button id="ehb">Enter House</button></div>
<button id="exit-btn">Outside</button>

<!-- Action buttons — clean text, no emojis -->
<div id="action-panel">
  <button class="act-btn" id="hug-btn">Hug</button>
  <button class="act-btn" id="hold-btn">Hold Hands</button>
</div>

<!-- Interaction toast -->
<div id="emote-bubble">Together</div>

<!-- HUD overlay -->
<div id="hud">
  <div id="title">
    <h1>Felicity's World</h1>
    <p>A peaceful place to wander</p>
  </div>
  <div id="jz"></div>
  <div id="info">WASD · Joystick · Move</div>
</div>

<!-- THREE.js r128 CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- nipplejs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
//  LOADING PROGRESS
// ─────────────────────────────────────────────────────────────
var lbar=document.getElementById('lbar'),lpct=0;
var lint=setInterval(function(){lpct=Math.min(lpct+Math.random()*10,88);lbar.style.width=lpct+'%';},100);

// ─────────────────────────────────────────────────────────────
//  RENDERER
// ─────────────────────────────────────────────────────────────
var W=window.innerWidth,H=window.innerHeight;
var renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W,H);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;

var insideHouse=false;
var clock=new THREE.Clock();

// ─────────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────────
function mkBox(w,h,d,color){
  return new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color:color})
  );
}
function addBox(scene,w,h,d,color,x,y,z,parent){
  var m=mkBox(w,h,d,color);
  m.position.set(x,y,z);
  m.castShadow=true;m.receiveShadow=true;
  if(parent){parent.add(m);}else{scene.add(m);}
  return m;
}
function sceneBox(sc,w,h,d,color,x,y,z){return addBox(sc,w,h,d,color,x,y,z,null);}

// ═════════════════════════════════════════════════════════════
//  OUTDOOR SCENE — SUNSET ATMOSPHERE
// ═════════════════════════════════════════════════════════════
var OUT=new THREE.Scene();
// Warm gradient sky color
OUT.background=new THREE.Color(0xff8c42); // golden-orange horizon
OUT.fog=new THREE.FogExp2(0xe07040,.010);  // warm hazy fog

var outCam=new THREE.PerspectiveCamera(46,W/H,0.1,300);
var CAM_OFF=new THREE.Vector3(0,20,16);
outCam.position.copy(CAM_OFF);
outCam.lookAt(0,0,0);

// ── SUNSET LIGHTING ──────────────────────────────────────────
// Low-angle warm directional sun (golden hour)
var sun=new THREE.DirectionalLight(0xffb347,1.2);
sun.position.set(-25,8,30); // low on the horizon, slightly in front
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-55;sun.shadow.camera.right=55;
sun.shadow.camera.top=55;sun.shadow.camera.bottom=-55;
sun.shadow.camera.far=200;sun.shadow.bias=-0.001;
OUT.add(sun);

// Hemisphere: warm peach sky top, soft purple-mauve ground bounce
var hemi=new THREE.HemisphereLight(0xffcc88,0x7a5aa8,0.65);
OUT.add(hemi);

// Soft fill from opposite side (cool blue rim for depth)
var rimLight=new THREE.DirectionalLight(0x6699cc,0.18);
rimLight.position.set(20,12,-15);
OUT.add(rimLight);

// Ambient low so shadows are rich
OUT.add(new THREE.AmbientLight(0xff9966,0.28));

// ── GROUND (warm green dusk tones) ───────────────────────────
var gGeo=new THREE.PlaneGeometry(150,150,1,1);
var ground=new THREE.Mesh(gGeo,new THREE.MeshLambertMaterial({color:0x4a7a30}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;OUT.add(ground);

// Darker patches
[[8,10,4.2],[-12,6,3],[5,-14,3.5],[-8,-8,2.8],[15,-6,3],[-14,10,2.5]].forEach(function(p){
  var pg=new THREE.Mesh(new THREE.CircleGeometry(p[2],12),new THREE.MeshLambertMaterial({color:0x3a6a20}));
  pg.rotation.x=-Math.PI/2;pg.position.set(p[0],0.01,p[1]);pg.receiveShadow=true;OUT.add(pg);
});

// Lawn near house
var lawn=new THREE.Mesh(new THREE.CircleGeometry(10,24),new THREE.MeshLambertMaterial({color:0x3a9018}));
lawn.rotation.x=-Math.PI/2;lawn.position.set(0,0.008,-14);OUT.add(lawn);

// Stone path
(function(){
  for(var s=0;s<14;s++){
    var ang=(Math.random()-.5)*.4;
    var st=new THREE.Mesh(new THREE.CylinderGeometry(.4+Math.random()*.18,.45,.07,7),
      new THREE.MeshLambertMaterial({color:s%2===0?0x9a8c7a:0x8b7a68}));
    st.position.set(Math.sin(ang)*.65,0.04,-6+s*.85);
    st.rotation.y=Math.random()*Math.PI;
    st.receiveShadow=true;OUT.add(st);
  }
})();

var dirt=new THREE.Mesh(new THREE.CircleGeometry(7.5,24),new THREE.MeshLambertMaterial({color:0x8b7355}));
dirt.rotation.x=-Math.PI/2;dirt.position.set(0,0.005,-14);OUT.add(dirt);

// ── MOUNTAINS (warm dusk silhouette tones) ────────────────────
[[-46,-46,22,13,0x7a5040],[-28,-52,19,12,0x6a4030],[0,-54,25,16,0x8a6050],
 [30,-51,21,12,0x7a5040],[49,-46,18,12,0x6a4030],[-53,-20,17,11,0x8a6050],
 [-53,7,15,10,0x7a5040],[53,-20,17,11,0x6a4030],[53,7,15,10,0x8a6050],
 [-39,-39,13,8,0x9a7060],[39,-39,13,8,0x9a7060],
 [0,-54,8,4.5,0xffe0c8],[-46,-46,7,3.5,0xffe0c8],[49,-46,6,3,0xffe0c8]
].forEach(function(m){
  var geo=new THREE.ConeGeometry(m[3],m[2],7);
  var pos=geo.attributes.position;
  for(var i=0;i<pos.count;i++){var py=pos.getY(i);if(py>0&&py<m[2]*.55){pos.setX(i,pos.getX(i)+(Math.random()-.5)*m[3]*.35);pos.setZ(i,pos.getZ(i)+(Math.random()-.5)*m[3]*.35);}}
  geo.computeVertexNormals();
  var mesh=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({color:m[4],flatShading:true}));
  mesh.position.set(m[0],m[2]/2-.5,m[1]);mesh.castShadow=true;mesh.receiveShadow=true;OUT.add(mesh);
});

// ─────────────────────────────────────────────────────────────
//  TUDOR HOUSE (Outdoor)
// ─────────────────────────────────────────────────────────────
var HOUSE=new THREE.Group();HOUSE.position.set(0,0,-14);OUT.add(HOUSE);
function HB(w,h,d,col,x,y,z){return addBox(OUT,w,h,d,col,x,y,z,HOUSE);}

HB(9.4,.3,8.2,0xb0a090,0,.15,0);
HB(8.8,3.8,7.8,0x8b3a2a,0,2.1,0);
HB(8.85,.88,7.85,0xf0ece4,0,3.55,0);
HB(8.85,.85,7.85,0xeee8e0,0,.58,0);
[-3.8,-1.2,1.2,3.8].forEach(function(tx){HB(.22,3.8,.14,0x2c1a08,tx,2.1,3.93);HB(.22,3.8,.14,0x2c1a08,tx,2.1,-3.93);});
[.55,1.8,3.15].forEach(function(ty){HB(8.8,.16,.14,0x2c1a08,0,ty,3.93);HB(8.8,.16,.14,0x2c1a08,0,ty,-3.93);});
[-2.6,0,2.6].forEach(function(tz){HB(.14,3.8,.22,0x2c1a08,-4.55,2.1,tz);HB(.14,3.8,.22,0x2c1a08,4.55,2.1,tz);});
var rFront=mkBox(10.9,.2,5.4,0x2e2825);rFront.rotation.x=0.50;rFront.position.set(0,5.28,2.2);rFront.castShadow=true;rFront.receiveShadow=true;HOUSE.add(rFront);
var rBack=mkBox(10.9,.2,5.4,0x2e2825);rBack.rotation.x=-0.50;rBack.position.set(0,5.28,-2.2);rBack.castShadow=true;rBack.receiveShadow=true;HOUSE.add(rBack);
HB(11.0,.28,.28,0x1a1614,0,6.52,0);
HB(11.0,.18,.28,0x181412,0,3.84,4.08);HB(11.0,.18,.28,0x181412,0,3.84,-4.08);
[0,.6,1.2,1.8,2.4].forEach(function(gh,gi){var w=9.0-gi*1.5;HB(w,.65,.2,0x8b3a2a,0,3.85+gh*0.53,-4.0);HB(w,.65,.2,0x8b3a2a,0,3.85+gh*0.53,4.0);});
HB(.95,2.2,.95,0xb09070,2.2,5.55,-1.8);HB(1.15,.18,1.15,0x9a8060,2.2,6.65,-1.8);
HB(1.9,2.65,.14,0xd0c0a0,0,1.42,3.93);HB(1.48,2.3,.12,0x3a2010,0,1.38,3.95);
HB(.48,.75,.08,0x4a2e14,-.30,1.78,3.98);HB(.48,.75,.08,0x4a2e14,.30,1.78,3.98);

function blockedIn(nx,nz){
  // Outer walls
  if(nx<-8.9||nx>8.9||nz>7.7||nz<-7.9)return true;
  // Left divider wall (x≈−3, z<−0.5): passthrough gap at z>−0.5
  if(nx>-3.22&&nx<-2.78&&nz<-0.5)return true;
  // Right divider wall (x≈3, z<−2): passthrough gap at z>−2
  if(nx>2.78&&nx<3.22&&nz<-2.0)return true;
  // Sofa block
  if(nx>-2.5&&nx<2.5&&nz>3.1&&nz<4.6)return true;
  // Bed block
  if(nx<-4.5&&nx>-8.0&&nz>-5.8&&nz<-0.2)return true;
  // Wardrobe
  if(nx<-6.8&&nz<-6.2)return true;
  // Fireplace
  if(nx<-4.5&&nz<-7.5)return true;
  // Kitchen counters (back)
  if(nx>3.5&&nz<-5.8)return true;
  // Kitchen counter (right wall)
  if(nx>7.9&&nz<-1.8)return true;
  // Dining table
  if(nx>4.5&&nx<7.2&&nz>-3.5&&nz<-2.1)return true;
  // Bookshelf
  if(nx>8.3&&nz>0.8&&nz<4.2)return true;
  // Armchair
  if(nx<-1.6&&nx>-3.2&&nz>-0.2&&nz<1.4)return true;
  return false;
}

function buildChar(scene,isFel){
  var G=new THREE.Group();
  function b(w,h,d,c){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:c}));}
  function a(m,x,y,z){m.position.set(x,y,z);m.castShadow=true;G.add(m);return m;}

  // ── TORSO / BODY (added to G — never animated, correct) ────
  if(isFel){
    // Skirt layers
    a(b(.82,.14,.60,0xff4499),0,.76,0);
    a(b(.78,.20,.58,0xff66aa),0,.92,0);
    a(b(.72,.12,.54,0xff88cc),0,1.06,0);
    // Body
    a(b(.66,.68,.52,0xffeef6),0,1.38,0);
    // Shoulder panels
    a(b(.18,.72,.52,0xff6eb4),-.32,1.42,0);
    a(b(.18,.72,.52,0xff6eb4),.32,1.42,0);
  } else {
    // Belt
    a(b(.78,.12,.48,0x1a1208),0,1.08,0);
    // Torso/shirt
    a(b(.80,.74,.56,0x1e3a6e),0,1.47,0);
    // Shoulders
    a(b(.18,.18,.56,0x223f76),-.46,1.78,0);
    a(b(.18,.18,.56,0x223f76),.46,1.78,0);
  }

  // ── ARMS (pivot groups — animated) ────────────────────────
  var lArm=new THREE.Group();lArm.position.set(isFel?-.50:-.58,isFel?1.72:1.78,0);
  var rArm=new THREE.Group();rArm.position.set(isFel?.50:.58,isFel?1.72:1.78,0);
  var aCols=isFel?[0xff6eb4,0xff6eb4,0xff8cc4,0xffd6b0,0xffc8a0,0xffd6b0]
                 :[0x1e3a6e,0x1e3a6e,0x223f76,0x2a4e8e,0xffc9a0,0xffc9a0];
  [0,-.22,-.44,-.66,-.86,-1.06].forEach(function(y,i){
    var aw=i<3?(isFel?.24:.28):(isFel?.20:.24);
    [lArm,rArm].forEach(function(arm){
      var am=new THREE.Mesh(new THREE.BoxGeometry(aw,.22,aw),new THREE.MeshLambertMaterial({color:aCols[i]}));
      am.position.y=y; arm.add(am);
    });
  });
  G.add(lArm); G.add(rArm);

  // ── LEGS (pivot groups — animated) ────────────────────────
  // Pivot origin is at hip height (y=0.72 in G space).
  // All leg/shoe segments are children of the pivot group with
  // LOCAL y offsets so they swing correctly. NO static copies in G.
  var lLeg=new THREE.Group(); lLeg.position.set(-.18,.72,0);
  var rLeg=new THREE.Group(); rLeg.position.set( .18,.72,0);

  if(isFel){
    // Upper leg (thigh) — dark indigo
    [lLeg,rLeg].forEach(function(lg){
      var thigh=new THREE.Mesh(new THREE.BoxGeometry(.26,.30,.26),new THREE.MeshLambertMaterial({color:0x2a1a3a}));
      thigh.position.set(0,-.14,0); lg.add(thigh);

function buildCat(scene){

  }
  function s(r,mat,x,y,z){

  // Body
  b(0.52,0.38,0.7,bodyMat, 0,0.28,0);

    b(0.14,0.24,0.16,bodyMat,l[0],l[1],l[2]);

var MTN_C=[[-46,-46,10],[-28,-52,9],[0,-55,12],[30,-51,10],[49,-46,10],[-53,-20,9],[-53,7,8],[53,-20,9],[53,7,8],[-39,-39,7],[39,-39,7]];
var BOUND=42;

function blockedOut(nx,nz){
  if(nx>HOUSE.position.x-5.0&&nx<HOUSE.position.x+5.0&&nz>HOUSE.position.z-4.5&&nz<HOUSE.position.z+6.2)return true;
  for(var t=0;t<TREE_POS.length;t++){var dx=nx-TREE_POS[t][0],dz=nz-TREE_POS[t][1];if(dx*dx+dz*dz<TREE_R*TREE_R)return true;}
  for(var m=0;m<MTN_C.length;m++){var mx=nx-MTN_C[m][0],mz=nz-MTN_C[m][1],mr=MTN_C[m][2];if(mx*mx+mz*mz<mr*mr)return true;}
  return false;
}
function tryMove(pos,mx,mz,speed,dt,blockFn){
  var nx=pos.x+mx*speed*dt,nz=pos.z+mz*speed*dt;
  nx=Math.max(-BOUND,Math.min(BOUND,nx));nz=Math.max(-BOUND,Math.min(BOUND,nz));
  if(!blockFn(nx,nz)){pos.x=nx;pos.z=nz;return;}
  var nx2=Math.max(-BOUND,Math.min(BOUND,pos.x+mx*speed*dt));
  if(!blockFn(nx2,pos.z)){pos.x=nx2;return;}
  var nz2=Math.max(-BOUND,Math.min(BOUND,pos.z+mz*speed*dt));
  if(!blockFn(pos.x,nz2))pos.z=nz2;
}

// ─────────────────────────────────────────────────────────────
//  LIMB ANIMATION — separated so hug arms never clobber walk legs
// ─────────────────────────────────────────────────────────────
var SWING=0.55;
// Walk legs only (arms driven separately)
function walkLegs(ch,ph){
  var sw=Math.sin(ph)*SWING;
  ch._lLeg.rotation.x=sw;
  ch._rLeg.rotation.x=-sw;
}
// Walk arms only
function walkArms(ch,ph){
  var sw=Math.sin(ph)*SWING;
  ch._lArm.rotation.x=-sw*0.65;
  ch._rArm.rotation.x= sw*0.65;
}
// Full walk (both)
function animLimbs(ch,ph){
  walkLegs(ch,ph);
  walkArms(ch,ph);
}
// Decay all rotations toward 0
function idleLimbs(ch){
  ch._lLeg.rotation.x*=.85; ch._rLeg.rotation.x*=.85;
  ch._lLeg.rotation.z*=.85; ch._rLeg.rotation.z*=.85;
  ch._lArm.rotation.x*=.85; ch._rArm.rotation.x*=.85;
  ch._lArm.rotation.z*=.85; ch._rArm.rotation.z*=.85;
}
// Snap all rotations instantly to 0
function resetLimbs(ch){
  ch._lLeg.rotation.set(0,0,0);
  ch._rLeg.rotation.set(0,0,0);
  ch._lArm.rotation.set(0,0,0);
  ch._rArm.rotation.set(0,0,0);
}

// Heart particles
var hearts=[];
function spawnHeart(scene,x,y,z){
  var types=[{col:0xff4488,emiss:0xff1155,sz:.13},{col:0xff88bb,emiss:0xff4488,sz:.10},{col:0xffdd55,emiss:0xffaa00,sz:.10},{col:0xff99cc,emiss:0xff5599,sz:.12},{col:0xffffff,emiss:0xffccdd,sz:.08}];
  var t=types[Math.floor(Math.random()*types.length)];
  var geo=Math.random()>.4?new THREE.SphereGeometry(t.sz,5,4):new THREE.OctahedronGeometry(t.sz*.9,0);
  var h=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:t.col,emissive:new THREE.Color(t.emiss),emissiveIntensity:2.2,transparent:true,opacity:1.0}));
  h.position.set(x+(Math.random()-.5)*.3,y,z+(Math.random()-.5)*.3);
  scene.add(h);
  var spin=(Math.random()-.5)*4;
  hearts.push({m:h,vy:.9+Math.random()*.5,vx:(Math.random()-.5)*.4,vz:(Math.random()-.5)*.3,spin:spin,t:0,scene:scene});
}
function updateHearts(dt){
  for(var hi=hearts.length-1;hi>=0;hi--){
    var h=hearts[hi];h.t+=dt;h.vy-=dt*0.4;
    h.m.position.y+=h.vy*dt;h.m.position.x+=h.vx*dt;h.m.position.z+=h.vz*dt;
    h.m.rotation.y+=h.spin*dt;h.m.rotation.z+=h.spin*.5*dt;
    var life=h.t/1.5;h.m.material.opacity=Math.max(0,1.0-life*life);
    var sc=h.t<.18?(h.t/.18*1.4):(1.4-life*.8);h.m.scale.setScalar(Math.max(0,sc));
    if(h.t>1.5){h.scene.remove(h.m);hearts.splice(hi,1);}
  }
}

// ─────────────────────────────────────────────────────────────
//  HUG LERP TARGETS
// ─────────────────────────────────────────────────────────────
var _hugFelTarget=new THREE.Vector3();
var _hugChrisTarget=new THREE.Vector3();

// ─────────────────────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────────────────────
var wt=0,cwt=0,iwt=0,icwt=0,elapsed=0,fireFlicker=0;
var OSPEED=5.5,CSPD=5.2,ISPEED=4.2;
var camP=new THREE.Vector3(),camL=new THREE.Vector3();
var inCamP=new THREE.Vector3(),inCamL=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),.05);
  elapsed+=dt;

  // ── BIRDS ────────────────────────────────────────────────────
  birds.forEach(function(bg){
    bg._t+=dt*.6;
    bg.position.x=bg._cx+Math.cos(bg._t)*bg._cr;
    bg.position.z=bg._cz+Math.sin(bg._t)*bg._cr;
    bg.position.y=11+Math.sin(bg._t*2.2)*1.5+bg._rx;
    bg.rotation.y=-bg._t+Math.PI/2;
    bg.rotation.z=Math.sin(bg._t*3)*.12;
    bg._wL.rotation.z=Math.sin(elapsed*8)*0.45+0.1;
    bg._wR.rotation.z=-Math.sin(elapsed*8)*0.45-0.1;
  });

  // ── FROGS ────────────────────────────────────────────────────
  frogs.forEach(function(fg){
    fg._t+=dt;
    if(fg._t>fg._nextHop){fg._hopT=0;fg._t=0;fg._nextHop=2+Math.random()*3;fg._hx=(Math.random()-.5)*1.2;fg._hz=(Math.random()-.5)*1.2;}
    if(fg._hopT<.5){fg._hopT+=dt*3;var ht=Math.sin(fg._hopT*Math.PI);fg.position.y=.08+ht*.35;fg.position.x=fg._baseX+(fg._hx||0)*(fg._hopT/1.5||0);fg.position.z=fg._baseZ+(fg._hz||0)*(fg._hopT/1.5||0);}
    else{fg.position.y=.08;}
  });

  // ── BUTTERFLIES — Feature #4 ─────────────────────────────────
  butterflies.forEach(function(bf){
    bf.t+=dt*bf.speed;
    // Orbital flight path with gentle bobbing
    bf.g.position.x=bf.cx+Math.cos(bf.t)*bf.r+Math.sin(bf.t*0.7)*0.8;
    bf.g.position.y=bf.cy+Math.sin(bf.t*1.3)*0.5+Math.cos(bf.t*0.5)*0.3;
    bf.g.position.z=bf.cz+Math.sin(bf.t)*bf.r*0.6+Math.cos(bf.t*0.9)*0.6;
    // Face direction of travel
    bf.g.rotation.y=bf.t+Math.PI/2;
    // Wing flap — realistic butterfly flutter (fast up, slow down)
    var flapAngle=Math.abs(Math.sin(elapsed*6+bf.t*2))*1.1-0.15;
    bf.wLp.rotation.y= flapAngle;
    bf.wRp.rotation.y=-flapAngle;
    // Gentle tilt
    bf.g.rotation.z=Math.sin(bf.t*1.2)*.18;
  });

  // ── TULIPS gentle sway — Feature #4 ─────────────────────────
  TULIPS.forEach(function(tl){
    tl.g.rotation.z=Math.sin(elapsed*0.9+tl.idx)*0.04;
    tl.g.rotation.x=Math.sin(elapsed*0.7+tl.idx*1.3)*0.02;
  });

  // ── Hearts ───────────────────────────────────────────────────
  updateHearts(dt);

  // ── Fire flicker ─────────────────────────────────────────────
  fireFlicker+=dt*8;
  fireL.intensity=1.4+Math.sin(fireFlicker)*.55+Math.sin(fireFlicker*1.7)*.22;
  fireMeshes.forEach(function(fm,i){fm.scale.y=.85+Math.sin(fireFlicker*(1.1+i*.25))*.22;fm.rotation.y=elapsed*(2+i);});
  lanternGlows.forEach(function(ll){ll.intensity=.58+Math.sin(elapsed*2.1+ll.position.x)*.1;});
  intLight.intensity=.65+Math.sin(elapsed*1.7)*.12;
  kitchenL.intensity=.85+Math.sin(elapsed*1.9)*.1;
  interiorWarmLight.intensity=2.0+Math.sin(elapsed*1.3)*.28;

  // Input
  var kb=kbIn();
  var mx=jIn.on?jIn.x:kb.x,mz=jIn.on?jIn.y:kb.y;
  var moving=Math.abs(mx)>.015||Math.abs(mz)>.015;

  if(insideHouse){
    // ══════════════════════════════════════════════════════════
    //  INDOOR — single authoritative animation dispatcher
    //  Rule: each character's limbs are set EXACTLY ONCE per frame
    // ══════════════════════════════════════════════════════════

    // ── Felicity movement & rotation ─────────────────────────
    if(moving && !hugActive){
      iwt+=dt;
      tryMove(inFel.position,mx,mz,ISPEED,dt,blockedIn);
      var ta=Math.atan2(mx,mz),da=ta-inFel.rotation.y;
      while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
      inFel.rotation.y+=da*Math.min(1,dt*12);
    } else if(moving && hugActive){
      iwt+=dt;
      tryMove(inFel.position,mx,mz,ISPEED*0.55,dt,blockedIn);
      var ta2=Math.atan2(mx,mz),da2=ta2-inFel.rotation.y;
      while(da2>Math.PI)da2-=Math.PI*2; while(da2<-Math.PI)da2+=Math.PI*2;
      inFel.rotation.y+=da2*Math.min(1,dt*8);
    } else {
      if(!hugActive) iwt=0;
    }

    // ── Felicity Y (floor-clamped bob) ───────────────────────
    inFel.position.y = FLOOR_Y + (moving ? Math.abs(Math.sin(iwt*9))*0.04 : Math.abs(Math.sin(elapsed*1.4))*0.018);

    // ── HUG ─────────────────────────────────────────────────
    if(hugActive){
      hugTimer+=dt;
      var hDx=inFel.position.x-inChris.position.x;
      var hDz=inFel.position.z-inChris.position.z;
      var hDist=Math.sqrt(hDx*hDx+hDz*hDz);
      if(hDist>0.01){
        _hugChrisTarget.set(
          inFel.position.x-(hDx/hDist)*0.92,
          FLOOR_Y,
          inFel.position.z-(hDz/hDist)*0.92
        );
      }
      inChris.position.lerp(_hugChrisTarget, Math.min(1,dt*6));
      inChris.rotation.y=Math.atan2(hDx,hDz);
      inFel.rotation.y  =Math.atan2(-hDx,-hDz);

      // ── Chris Y during hug
      inChris.position.y = FLOOR_Y + (moving ? Math.abs(Math.sin(iwt*9))*0.04 : Math.abs(Math.sin(elapsed*1.8))*0.018);

      // ── LIMBS: one call each, no doubles ─────────────────
      if(moving){
        walkLegs(inFel,  iwt*9);
        walkLegs(inChris,iwt*9);
      } else {
        idleLimbs(inFel);
        idleLimbs(inChris);
      }
      // Arms in hug pose (overrides arm X from walkArms — intentional)
      var sway=Math.sin(elapsed*1.9)*0.055;
      inFel._lArm.rotation.x  =-1.05+sway; inFel._rArm.rotation.x  =-1.05+sway;
      inFel._lArm.rotation.z  =-0.80;       inFel._rArm.rotation.z  = 0.80;
      inChris._lArm.rotation.x=-1.05-sway;  inChris._rArm.rotation.x=-1.05-sway;
      inChris._lArm.rotation.z=-0.80;        inChris._rArm.rotation.z= 0.80;

      // Hearts
      if(Math.floor(hugTimer*7)>Math.floor((hugTimer-dt)*7)){
        for(var _hi2=0;_hi2<3;_hi2++){
          spawnHeart(IN,
            (inFel.position.x+inChris.position.x)/2+(Math.random()-.5)*0.7,
            2.8+Math.random()*0.5,
            (inFel.position.z+inChris.position.z)/2+(Math.random()-.5)*0.7
          );
        }
      }

    // ── HOLD HANDS ─────────────────────────────────────────
    } else if(holdHandActive){
      if(Math.random()<dt*1.5){
        spawnHeart(IN, inFel.position.x+(Math.random()-.5)*0.4, 2.5+Math.random()*0.8, inFel.position.z+(Math.random()-.5)*0.4);
      }
      var sY=Math.sin(inFel.rotation.y), cY=Math.cos(inFel.rotation.y);
      inChris.position.x=inFel.position.x+cY*0.88;
      inChris.position.z=inFel.position.z-sY*0.88;
      inChris.rotation.y=inFel.rotation.y;

      if(moving){
        inChris.position.y = FLOOR_Y + Math.abs(Math.sin(iwt*9))*0.04;
        // Full walk for Chris, full walk for Felicity
        walkLegs(inFel,  iwt*9);
        walkArms(inFel,  iwt*9);
        walkLegs(inChris,iwt*9);
        walkArms(inChris,iwt*9);
        // Override joined-hand arm Z on top of walk swing
        inFel._rArm.rotation.z  = 0.52+Math.sin(elapsed*1.5)*0.05;
        inChris._lArm.rotation.z=-0.52+Math.sin(elapsed*1.5)*0.05;
      } else {
        inChris.position.y = FLOOR_Y + Math.abs(Math.sin(elapsed*1.2))*0.018;
        idleLimbs(inFel);
        idleLimbs(inChris);
        inFel._rArm.rotation.z  = 0.52+Math.sin(elapsed*1.5)*0.05;
        inChris._lArm.rotation.z=-0.52+Math.sin(elapsed*1.5)*0.05;
      }

    // ── FREE FOLLOW (no special state) ─────────────────────
    } else {
      // Felicity limbs
      if(moving){ animLimbs(inFel, iwt*9); } else { idleLimbs(inFel); }

      // Chris follow
      icwt=icwt||0;
      var icDx=inFel.position.x+1.5-inChris.position.x;
      var icDz=inFel.position.z+1.2-inChris.position.z;
      var icDist=Math.sqrt(icDx*icDx+icDz*icDz);
      if(icDist>0.5){
        icwt+=dt;
        var ics=Math.min(CSPD*0.85*dt, icDist-0.5);
        var icNx=inChris.position.x+(icDx/icDist)*ics;
        var icNz=inChris.position.z+(icDz/icDist)*ics;
        if(!blockedIn(icNx,icNz)){inChris.position.x=icNx; inChris.position.z=icNz;}
        else{
          var pa=Math.atan2(icDx,icDz)+Math.PI/2*(Math.random()>.5?1:-1);
          var px2=inChris.position.x+Math.sin(pa)*ics*1.5;
          var pz2=inChris.position.z+Math.cos(pa)*ics*1.5;
          if(!blockedIn(px2,inChris.position.z)) inChris.position.x=px2;
          else if(!blockedIn(inChris.position.x,pz2)) inChris.position.z=pz2;
        }
        var cAngle=Math.atan2(icDx,icDz), cDa=cAngle-inChris.rotation.y;
        while(cDa>Math.PI)cDa-=Math.PI*2; while(cDa<-Math.PI)cDa+=Math.PI*2;
        inChris.rotation.y+=cDa*Math.min(1,dt*9);
        inChris.position.y = FLOOR_Y + Math.abs(Math.sin(icwt*8))*0.04;
        animLimbs(inChris, icwt*8);
      } else {
        icwt=0;
        inChris.position.y = FLOOR_Y + Math.abs(Math.sin(elapsed*1.2))*0.018;
        idleLimbs(inChris);
        var lix=inFel.position.x-inChris.position.x, liz=inFel.position.z-inChris.position.z;
        if(Math.abs(lix)+Math.abs(liz)>0.1){
          var lda=Math.atan2(lix,liz)-inChris.rotation.y;
          while(lda>Math.PI)lda-=Math.PI*2; while(lda<-Math.PI)lda+=Math.PI*2;
          inChris.rotation.y+=lda*dt*2.5;
        }
      }
    }

    // ── INDOOR CAT FOLLOW ────────────────────────────────────────
    // Cat targets a point behind the group centroid (Felicity + Chris midpoint)
    // Uses lerp-based smooth follow with collision avoidance
    (function(){
      // Group centroid
      var gcx=(inFel.position.x+inChris.position.x)*0.5;
      var gcz=(inFel.position.z+inChris.position.z)*0.5;
      // Direction FROM centroid TO cat (so cat stays behind)
      var avgRY=(inFel.rotation.y+inChris.rotation.y)*0.5;
      // Target: CAT_FOLLOW_DIST behind the centroid along facing direction
      var catTX=gcx+Math.sin(avgRY)*CAT_FOLLOW_DIST;
      var catTZ=gcz+Math.cos(avgRY)*CAT_FOLLOW_DIST;
      var cdx=catTX-inCat.position.x;
      var cdz=catTZ-inCat.position.z;
      var cdist=Math.sqrt(cdx*cdx+cdz*cdz);

      if(cdist>0.15){
        catWtIn+=dt;
        var cspd=Math.min(CAT_SPEED*dt,cdist);
        var cnx=inCat.position.x+(cdx/cdist)*cspd;
        var cnz=inCat.position.z+(cdz/cdist)*cspd;
        // Simple collision — if blocked try perpendicular slide
        if(!blockedIn(cnx,cnz)){
          inCat.position.x=cnx;inCat.position.z=cnz;
        } else if(!blockedIn(cnx,inCat.position.z)){
          inCat.position.x=cnx;
        } else if(!blockedIn(inCat.position.x,cnz)){
          inCat.position.z=cnz;
        }
        // Face direction of travel
        var catA=Math.atan2(cdx,cdz),catDA=catA-inCat.rotation.y;
        while(catDA>Math.PI)catDA-=Math.PI*2;while(catDA<-Math.PI)catDA+=Math.PI*2;
        inCat.rotation.y+=catDA*Math.min(1,dt*9);
        // Walk bob + tail wag
        inCat.position.y=Math.abs(Math.sin(catWtIn*10))*0.04;
        inCat._tail.rotation.z=Math.sin(catWtIn*8)*0.35;
        inCat._tail.rotation.y=Math.sin(catWtIn*6)*0.2;
      } else {
        // Idle — gentle sit bob + slow tail flick
        catWtIn=0;
        inCat.position.y=Math.abs(Math.sin(elapsed*1.1))*0.015;
        inCat._tail.rotation.z=Math.sin(elapsed*1.4)*0.2;
        inCat._tail.rotation.y=Math.sin(elapsed*0.8)*0.15;
      }
    })();

    // ── INDOOR BUNNY FOLLOW ──────────────────────────────────
    (function(){
      var gcx=(inFel.position.x+inChris.position.x)*0.5;
      var gcz=(inFel.position.z+inChris.position.z)*0.5;
      var avgRY=(inFel.rotation.y+inChris.rotation.y)*0.5;
      // Bunny follows slightly to the left of the cat trail
      var bTX=gcx+Math.sin(avgRY+0.5)*(CAT_FOLLOW_DIST+0.8);
      var bTZ=gcz+Math.cos(avgRY+0.5)*(CAT_FOLLOW_DIST+0.8);
      var bdx=bTX-inBunny.position.x, bdz=bTZ-inBunny.position.z;
      var bdist=Math.sqrt(bdx*bdx+bdz*bdz);
      if(bdist>0.2){
        bunnyWtIn+=dt;
        var bspd=Math.min(CAT_SPEED*0.8*dt,bdist);
        inBunny.position.x+=bdx/bdist*bspd;
        inBunny.position.z+=bdz/bdist*bspd;
        var bA=Math.atan2(bdx,bdz),bDA=bA-inBunny.rotation.y;
        while(bDA>Math.PI)bDA-=Math.PI*2; while(bDA<-Math.PI)bDA+=Math.PI*2;
        inBunny.rotation.y+=bDA*Math.min(1,dt*8);
        // Bunny hop bob
        inBunny.position.y=FLOOR_Y+Math.abs(Math.sin(bunnyWtIn*7))*0.10;
        // Ear flop
        inBunny._earL.rotation.x=Math.sin(bunnyWtIn*7)*0.2;
        inBunny._earR.rotation.x=-Math.sin(bunnyWtIn*7)*0.2;
      } else {
        bunnyWtIn=0;
        inBunny.position.y=FLOOR_Y+Math.abs(Math.sin(elapsed*1.2+1.0))*0.02;
        inBunny._earL.rotation.x=Math.sin(elapsed*0.9)*0.12;
        inBunny._earR.rotation.x=-Math.sin(elapsed*0.9)*0.12;
      }
    })();

    // ── INDOOR DINO FOLLOW ───────────────────────────────────
    (function(){
      var gcx=(inFel.position.x+inChris.position.x)*0.5;
      var gcz=(inFel.position.z+inChris.position.z)*0.5;
      var avgRY=(inFel.rotation.y+inChris.rotation.y)*0.5;
      // Dino follows to the right
      var dTX=gcx+Math.sin(avgRY-0.5)*(CAT_FOLLOW_DIST+1.2);
      var dTZ=gcz+Math.cos(avgRY-0.5)*(CAT_FOLLOW_DIST+1.2);
      var ddx=dTX-inDino.position.x, ddz=dTZ-inDino.position.z;
      var ddist=Math.sqrt(ddx*ddx+ddz*ddz);
      if(ddist>0.2){
        dinoWtIn+=dt;
        var dspd=Math.min(CAT_SPEED*0.85*dt,ddist);
        inDino.position.x+=ddx/ddist*dspd;
        inDino.position.z+=ddz/ddist*dspd;
        var dA=Math.atan2(ddx,ddz),dDA=dA-inDino.rotation.y;
        while(dDA>Math.PI)dDA-=Math.PI*2; while(dDA<-Math.PI)dDA+=Math.PI*2;
        inDino.rotation.y+=dDA*Math.min(1,dt*8);
        inDino.position.y=FLOOR_Y+Math.abs(Math.sin(dinoWtIn*8))*0.06;
        inDino._tail.rotation.z=Math.sin(dinoWtIn*7)*0.3;
      } else {
        dinoWtIn=0;
        inDino.position.y=FLOOR_Y+Math.abs(Math.sin(elapsed*1.0+2.0))*0.02;
        inDino._tail.rotation.z=Math.sin(elapsed*1.2)*0.18;
      }
    })();


    inCamP.set(inFel.position.x, IN_CAM_Y, inFel.position.z + IN_CAM_DZ);
    inCam.position.lerp(inCamP, Math.min(1, dt * 9));
    inCamL.set(inFel.position.x, 1.0, inFel.position.z);
    inCam.lookAt(inCamL);
    // Move character fill light with Felicity so she's always well-lit
    if(glbCharLight){
      glbCharLight.position.x=inFel.position.x;
      glbCharLight.position.z=inFel.position.z;
    }
    renderer.render(IN,inCam);

  } else {
    // ── OUTDOOR ──────────────────────────────────────────────────

    // ── OUTDOOR FELICITY MOVEMENT ────────────────────────────────
    if(moving && !hugActive){
      wt+=dt;
      tryMove(outFel.position,mx,mz,OSPEED,dt,blockedOut);
      var ota=Math.atan2(mx,mz),oda=ota-outFel.rotation.y;
      while(oda>Math.PI)oda-=Math.PI*2; while(oda<-Math.PI)oda+=Math.PI*2;
      outFel.rotation.y+=oda*Math.min(1,dt*13);
      outFel.position.y=Math.abs(Math.sin(wt*9))*0.05;
      animLimbs(outFel,wt*9);
    } else if(moving && hugActive){
      wt+=dt;
      tryMove(outFel.position,mx,mz,OSPEED*0.55,dt,blockedOut);
      var ota2=Math.atan2(mx,mz),oda2=ota2-outFel.rotation.y;
      while(oda2>Math.PI)oda2-=Math.PI*2; while(oda2<-Math.PI)oda2+=Math.PI*2;
      outFel.rotation.y+=oda2*Math.min(1,dt*8);
      outFel.position.y=Math.abs(Math.sin(wt*9))*0.05;
      walkLegs(outFel,wt*9);   // legs only — arms in hug block
      walkLegs(outChris,wt*9);
    } else {
      wt=0;
      outFel.position.y=Math.abs(Math.sin(elapsed*1.4))*0.022;
      if(!hugActive) idleLimbs(outFel);
    }

    // ── OUTDOOR HUG ──────────────────────────────────────────────
    if(hugActive){
      hugTimer+=dt;
      var oHDx=outFel.position.x-outChris.position.x;
      var oHDz=outFel.position.z-outChris.position.z;
      var oHDist=Math.sqrt(oHDx*oHDx+oHDz*oHDz);
      if(oHDist>0.01){
        _hugChrisTarget.set(
          outFel.position.x-(oHDx/oHDist)*0.92, 0,
          outFel.position.z-(oHDz/oHDist)*0.92
        );
      }
      outChris.position.lerp(_hugChrisTarget,Math.min(1,dt*6));
      outChris.rotation.y=Math.atan2(oHDx,oHDz);
      outFel.rotation.y=Math.atan2(-oHDx,-oHDz);
      if(!moving){
        idleLimbs(outFel); idleLimbs(outChris);
        outFel.position.y  =Math.abs(Math.sin(elapsed*1.8))*0.016;
        outChris.position.y=Math.abs(Math.sin(elapsed*1.8+0.5))*0.016;
      } else {
        outChris.position.y=outFel.position.y;
      }
      var oSway=Math.sin(elapsed*1.9)*0.055;
      outFel._lArm.rotation.x  =-1.0+oSway; outFel._rArm.rotation.x  =-1.0+oSway;
      outFel._lArm.rotation.z  =-0.75;       outFel._rArm.rotation.z  = 0.75;
      outChris._lArm.rotation.x=-1.0-oSway; outChris._rArm.rotation.x=-1.0-oSway;
      outChris._lArm.rotation.z=-0.75;       outChris._rArm.rotation.z= 0.75;
      if(Math.floor(hugTimer*6)>Math.floor((hugTimer-dt)*6)){
        for(var _hi=0;_hi<3;_hi++){
          spawnHeart(OUT,
            (outFel.position.x+outChris.position.x)/2+(Math.random()-.5)*0.8,
            3.8+Math.random()*0.6,
            (outFel.position.z+outChris.position.z)/2+(Math.random()-.5)*0.8
          );
        }
      }
    } else if(!holdHandActive){
      idleLimbs(outFel);
      if(!holdHandActive) idleLimbs(outChris);
    }

    // ── OUTDOOR HOLD HANDS ───────────────────────────────────────
    if(holdHandActive && !hugActive){
      if(Math.random()<dt*1.5){
        spawnHeart(OUT,outFel.position.x+(Math.random()-.5)*0.5,2.5+Math.random(),outFel.position.z+(Math.random()-.5)*0.5);
      }
      var oSY=Math.sin(outFel.rotation.y), oCY=Math.cos(outFel.rotation.y);
      outChris.position.x=outFel.position.x+oCY*0.9;
      outChris.position.z=outFel.position.z-oSY*0.9;
      outChris.position.y=outFel.position.y;
      outChris.rotation.y=outFel.rotation.y;
      if(moving){
        walkLegs(outChris,wt*9);
        walkArms(outChris,wt*9);
        walkArms(outFel,  wt*9);
        outChris.position.y=Math.abs(Math.sin(wt*9))*0.05;
        // Override joined arm Z after walk swing
        outFel._rArm.rotation.z  = 0.52+Math.sin(elapsed*1.4)*0.05;
        outChris._lArm.rotation.z=-0.52+Math.sin(elapsed*1.4)*0.05;
      } else {
        idleLimbs(outChris);
        outChris.position.y=Math.abs(Math.sin(elapsed*1.2+1))*0.022;
        outFel._rArm.rotation.z  = 0.52+Math.sin(elapsed*1.4)*0.05;
        outChris._lArm.rotation.z=-0.52+Math.sin(elapsed*1.4)*0.05;
      }
    } // end if(holdHandActive && !hugActive)

    // Outdoor Chris follow (only when NOT in special states)
    if(!hugActive&&!holdHandActive){
      var cDx=outFel.position.x+1.7-outChris.position.x;
      var cDz=outFel.position.z+1.5-outChris.position.z;
      var cDist=Math.sqrt(cDx*cDx+cDz*cDz);
      if(cDist>0.4){
        cwt+=dt;
        var cs=Math.min(CSPD*dt,cDist-0.4);
        var cnx=outChris.position.x+(cDx/cDist)*cs;
        var cnz=outChris.position.z+(cDz/cDist)*cs;
        if(!blockedOut(cnx,cnz)){outChris.position.x=cnx;outChris.position.z=cnz;}
        else{var ang2=Math.atan2(cDx,cDz)+Math.PI/2*(Math.random()>.5?1:-1);var px2=outChris.position.x+Math.sin(ang2)*cs*1.5;var pz2=outChris.position.z+Math.cos(ang2)*cs*1.5;if(!blockedOut(px2,outChris.position.z))outChris.position.x=px2;else if(!blockedOut(outChris.position.x,pz2))outChris.position.z=pz2;}
        var cta2=Math.atan2(cDx,cDz),cda2=cta2-outChris.rotation.y;
        while(cda2>Math.PI)cda2-=Math.PI*2;while(cda2<-Math.PI)cda2+=Math.PI*2;
        outChris.rotation.y+=cda2*Math.min(1,dt*9);
        outChris.position.y=Math.abs(Math.sin(cwt*8))*.06;
        animLimbs(outChris,cwt*8);
      } else {
        cwt=0;outChris.position.y=Math.abs(Math.sin(elapsed*1.2+1))*0.022;idleLimbs(outChris);
        var olx=outFel.position.x-outChris.position.x,olz=outFel.position.z-outChris.position.z;
        if(Math.abs(olx)+Math.abs(olz)>.1){var olda=Math.atan2(olx,olz)-outChris.rotation.y;while(olda>Math.PI)olda-=Math.PI*2;while(olda<-Math.PI)olda+=Math.PI*2;outChris.rotation.y+=olda*dt*2.5;}
      }
    }

    // ── OUTDOOR CAT FOLLOW ───────────────────────────────────────
    (function(){
      var gcx=(outFel.position.x+outChris.position.x)*0.5;
      var gcz=(outFel.position.z+outChris.position.z)*0.5;
      var avgRY=(outFel.rotation.y+outChris.rotation.y)*0.5;
      var catTX=gcx+Math.sin(avgRY)*CAT_FOLLOW_DIST;
      var catTZ=gcz+Math.cos(avgRY)*CAT_FOLLOW_DIST;
      var cdx=catTX-outCat.position.x;
      var cdz=catTZ-outCat.position.z;
      var cdist=Math.sqrt(cdx*cdx+cdz*cdz);

      if(cdist>0.2){
        catWt+=dt;
        var cspd=Math.min(CAT_SPEED*dt,cdist);
        var cnx=outCat.position.x+(cdx/cdist)*cspd;
        var cnz=outCat.position.z+(cdz/cdist)*cspd;
        if(!blockedOut(cnx,cnz)){
          outCat.position.x=cnx;outCat.position.z=cnz;
        } else if(!blockedOut(cnx,outCat.position.z)){
          outCat.position.x=cnx;
        } else if(!blockedOut(outCat.position.x,cnz)){
          outCat.position.z=cnz;
        }
        var catA=Math.atan2(cdx,cdz),catDA=catA-outCat.rotation.y;
        while(catDA>Math.PI)catDA-=Math.PI*2;while(catDA<-Math.PI)catDA+=Math.PI*2;
        outCat.rotation.y+=catDA*Math.min(1,dt*9);
        outCat.position.y=Math.abs(Math.sin(catWt*10))*0.05;
        outCat._tail.rotation.z=Math.sin(catWt*8)*0.35;
        outCat._tail.rotation.y=Math.sin(catWt*6)*0.2;
      } else {
        catWt=0;
        outCat.position.y=Math.abs(Math.sin(elapsed*1.1))*0.015;
        outCat._tail.rotation.z=Math.sin(elapsed*1.4)*0.2;
        outCat._tail.rotation.y=Math.sin(elapsed*0.8)*0.15;
      }
    })();

    // ── OUTDOOR BUNNY FOLLOW ─────────────────────────────────
    (function(){
      var gcx=(outFel.position.x+outChris.position.x)*0.5;
      var gcz=(outFel.position.z+outChris.position.z)*0.5;
      var avgRY=(outFel.rotation.y+outChris.rotation.y)*0.5;
      var bTX=gcx+Math.sin(avgRY+0.6)*(CAT_FOLLOW_DIST+1.0);
      var bTZ=gcz+Math.cos(avgRY+0.6)*(CAT_FOLLOW_DIST+1.0);
      var bdx=bTX-outBunny.position.x, bdz=bTZ-outBunny.position.z;
      var bdist=Math.sqrt(bdx*bdx+bdz*bdz);
      if(bdist>0.25){
        bunnyWt+=dt;
        var bspd=Math.min(CAT_SPEED*0.8*dt,bdist);
        outBunny.position.x+=bdx/bdist*bspd;
        outBunny.position.z+=bdz/bdist*bspd;
        var bA=Math.atan2(bdx,bdz),bDA=bA-outBunny.rotation.y;
        while(bDA>Math.PI)bDA-=Math.PI*2; while(bDA<-Math.PI)bDA+=Math.PI*2;
        outBunny.rotation.y+=bDA*Math.min(1,dt*8);
        outBunny.position.y=Math.abs(Math.sin(bunnyWt*7))*0.12;
        outBunny._earL.rotation.x=Math.sin(bunnyWt*7)*0.2;
        outBunny._earR.rotation.x=-Math.sin(bunnyWt*7)*0.2;
      } else {
        bunnyWt=0;
        outBunny.position.y=Math.abs(Math.sin(elapsed*1.2))*0.02;
        outBunny._earL.rotation.x=Math.sin(elapsed*0.8)*0.12;
        outBunny._earR.rotation.x=-Math.sin(elapsed*0.8)*0.12;
      }
    })();

    // ── OUTDOOR DINO FOLLOW ──────────────────────────────────
    (function(){
      var gcx=(outFel.position.x+outChris.position.x)*0.5;
      var gcz=(outFel.position.z+outChris.position.z)*0.5;
      var avgRY=(outFel.rotation.y+outChris.rotation.y)*0.5;
      var dTX=gcx+Math.sin(avgRY-0.6)*(CAT_FOLLOW_DIST+1.4);
      var dTZ=gcz+Math.cos(avgRY-0.6)*(CAT_FOLLOW_DIST+1.4);
      var ddx=dTX-outDino.position.x, ddz=dTZ-outDino.position.z;
      var ddist=Math.sqrt(ddx*ddx+ddz*ddz);
      if(ddist>0.25){
        dinoWt+=dt;
        var dspd=Math.min(CAT_SPEED*0.85*dt,ddist);
        outDino.position.x+=ddx/ddist*dspd;
        outDino.position.z+=ddz/ddist*dspd;
        var dA=Math.atan2(ddx,ddz),dDA=dA-outDino.rotation.y;
        while(dDA>Math.PI)dDA-=Math.PI*2; while(dDA<-Math.PI)dDA+=Math.PI*2;
        outDino.rotation.y+=dDA*Math.min(1,dt*8);
        outDino.position.y=Math.abs(Math.sin(dinoWt*8))*0.07;
        outDino._tail.rotation.z=Math.sin(dinoWt*7)*0.3;
      } else {
        dinoWt=0;
        outDino.position.y=Math.abs(Math.sin(elapsed*1.0))*0.02;
        outDino._tail.rotation.z=Math.sin(elapsed*1.2)*0.18;
      }
    })();

    // Outdoor camera
    camP.copy(outFel.position).add(CAM_OFF);
    outCam.position.lerp(camP,dt*7);
    camL.copy(outFel.position);camL.y+=1.3;
    outCam.lookAt(camL);

    // Door proximity
    _dpv.set(outFel.position.x,0,outFel.position.z);
    var wasNear=doorNear;
    doorNear=_dpv.distanceTo(DOOR_POS)<4.5;
    if(doorNear!==wasNear){if(doorNear)enterBtn.classList.add('show');else enterBtn.classList.remove('show');}

    renderer.render(OUT,outCam);
    updateLabel(lblF,outFel,3.5,outCam);
    updateLabel(lblC,outChris,3.9,outCam);
  }
}

// ─────────────────────────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────────────────────────
window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  outCam.aspect=W/H;outCam.updateProjectionMatrix();
  inCam.aspect=W/H;inCam.updateProjectionMatrix();
  renderer.setSize(W,H);
});

// ─────────────────────────────────────────────────────────────
//  START — called only after Play button is clicked
// ─────────────────────────────────────────────────────────────
function startGame(){
  lbar.style.width='100%';
  // Interior is 100% procedural — buildCozyInterior() already ran at startup.
  // No GLB loading needed; avoids all ProgressEvent / 404 errors.
  setTimeout(function(){
    clearInterval(lint);
    var ld=document.getElementById('ld');
    if(ld){ld.classList.add('go');setTimeout(function(){if(ld.parentNode)ld.parentNode.removeChild(ld);},800);}
    animate();
  },400);
}

// ─────────────────────────────────────────────────────────────
//  Pre-load progress bar starts immediately on page open
//  but game only renders after Play is clicked
// ─────────────────────────────────────────────────────────────
// (lint interval already started at top of script)

</script>
</body>
