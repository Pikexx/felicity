<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Cozy</title>
<style>
/* ───────────────────────────────────────────────────
   RESET & BASE
─────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#1a0e0a;touch-action:none;
  user-select:none;-webkit-user-select:none;
  font-family:'Segoe UI',system-ui,sans-serif
}
#c{display:block;width:100%;height:100%;position:absolute;top:0;left:0}

/* ── HUD ──────────────────────────────────────── */
#hud{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:10
}
#title{
  position:absolute;top:16px;left:50%;
  transform:translateX(-50%);text-align:center;
  pointer-events:none
}
#title h1{
  font-size:clamp(12px,2.5vw,17px);font-weight:700;
  color:rgba(255,220,160,.92);letter-spacing:.22em;
  text-transform:uppercase;
  text-shadow:0 0 18px rgba(255,120,0,.4),0 2px 10px rgba(0,0,0,.7)
}
#title p{font-size:9px;color:rgba(255,200,120,.42);letter-spacing:.16em;margin-top:2px}

/* ── JOYSTICK ──────────────────────────────────── */
#jz{
  position:absolute;bottom:100px;left:26px;
  width:130px;height:130px;
  pointer-events:all;touch-action:none
}
/* nipplejs custom */
.nipple .front{background:rgba(255,220,180,.9)!important;box-shadow:0 2px 12px rgba(0,0,0,.3)!important}
.nipple .back{background:rgba(255,200,140,.18)!important;border:2px solid rgba(255,200,130,.4)!important}

/* ── CORNER INFO ───────────────────────────────── */
#info{
  position:absolute;bottom:22px;right:18px;
  text-align:right;font-size:9px;
  color:rgba(255,200,140,.3);letter-spacing:.06em;line-height:1.9
}

/* ── NAME LABELS ──────────────────────────────── */
.lbl{
  position:fixed;pointer-events:none;
  transform:translate(-50%,-100%);
  font-size:11px;font-weight:700;letter-spacing:.09em;
  padding:3px 10px;border-radius:12px;
  white-space:nowrap;text-shadow:0 1px 5px rgba(0,0,0,.9);
  z-index:7;backdrop-filter:blur(5px)
}
.lbl-f{background:rgba(255,90,150,.28);border:1px solid rgba(255,150,200,.55);color:#ffc8e8}
.lbl-c{background:rgba(60,130,255,.28);border:1px solid rgba(100,170,255,.55);color:#c0d8ff}

/* ── ENTER BUTTON ─────────────────────────────── */
#enter-btn{
  position:fixed;left:50%;top:52%;
  transform:translate(-50%,-50%);
  z-index:20;pointer-events:none;opacity:0;
  transition:opacity .25s ease,top .25s ease
}
#enter-btn.show{opacity:1;pointer-events:all;top:50%}
#enter-btn button{
  background:rgba(20,12,6,.84);backdrop-filter:blur(16px);
  color:rgba(255,220,160,.95);
  border:1px solid rgba(255,200,120,.25);
  border-radius:24px;padding:10px 22px;
  font-size:12px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;
  font-family:inherit;touch-action:manipulation;
  transition:background .15s,transform .1s,box-shadow .15s;
  box-shadow:0 4px 18px rgba(0,0,0,.45);white-space:nowrap
}
#enter-btn button:hover{background:rgba(40,22,10,.9);box-shadow:0 6px 24px rgba(0,0,0,.55)}
#enter-btn button:active{transform:scale(.93)}

/* ── EXIT BUTTON ──────────────────────────────── */
#exit-btn{
  position:fixed;top:13px;left:13px;z-index:60;
  background:rgba(20,12,6,.84);backdrop-filter:blur(14px);
  color:rgba(255,210,140,.9);
  border:1px solid rgba(255,190,100,.2);
  border-radius:22px;padding:8px 16px;
  font-size:11px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;cursor:pointer;
  font-family:inherit;display:none;touch-action:manipulation;
  transition:transform .1s
}
#exit-btn:active{transform:scale(.93)}

/* ── ACTION BUTTONS — clean cozy pill, no emojis ── */
#action-panel{
  position:fixed;right:14px;bottom:180px;
  z-index:20;display:flex;flex-direction:column;gap:7px;
  pointer-events:all
}
.act-btn{
  background:rgba(255,245,235,.13);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:rgba(255,230,205,.9);
  border:1px solid rgba(255,215,180,.28);
  border-radius:50px;
  padding:8px 18px;
  font-size:10.5px;font-weight:700;
  font-family:inherit;
  letter-spacing:.14em;
  text-transform:uppercase;
  cursor:pointer;touch-action:manipulation;
  white-space:nowrap;
  box-shadow:0 2px 12px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.07);
  transition:background .18s,box-shadow .18s,transform .08s,border-color .18s,color .18s;
  min-width:108px;
  text-align:center;
  display:flex;align-items:center;justify-content:center;gap:6px
}
.act-btn::before{
  content:'';display:inline-block;
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,200,150,.5);flex-shrink:0;
  transition:background .18s,box-shadow .18s
}
.act-btn:hover{
  background:rgba(255,235,215,.2);
  box-shadow:0 3px 16px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.1)
}
.act-btn:active{transform:scale(.94);box-shadow:0 1px 5px rgba(0,0,0,.22)}
.act-btn.active{
  background:rgba(255,185,110,.22);
  border-color:rgba(255,200,130,.5);
  color:rgba(255,248,225,.98);
  box-shadow:0 2px 14px rgba(210,110,0,.2),inset 0 1px 0 rgba(255,255,255,.1)
}
.act-btn.active::before{
  background:rgba(255,200,80,.9);
  box-shadow:0 0 6px rgba(255,180,50,.65)
}

/* ── CAMERA VIEW TOGGLE ───────────────────────────── */
#cam-btn{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  z-index:30;
  background:rgba(10,8,6,.72);backdrop-filter:blur(14px);
  border:1px solid rgba(255,200,120,.18);
  border-radius:20px;padding:5px 14px;
  font-size:10px;font-weight:700;letter-spacing:.14em;
  color:rgba(255,220,160,.88);
  cursor:pointer;touch-action:manipulation;
  font-family:inherit;text-transform:uppercase;
  transition:background .15s,transform .08s;
  display:none
}
#cam-btn:active{transform:translateX(-50%) scale(.93)}
#cam-btn.show{display:block}

/* ── DAY / NIGHT TOGGLE ───────────────────────────── */
#tod-btn{
  position:fixed;top:50px;left:50%;transform:translateX(-50%);
  z-index:30;
  background:rgba(10,8,6,.72);backdrop-filter:blur(14px);
  border:1px solid rgba(255,200,120,.18);
  border-radius:20px;padding:5px 14px;
  font-size:10px;font-weight:700;letter-spacing:.14em;
  color:rgba(255,220,160,.88);
  cursor:pointer;touch-action:manipulation;
  font-family:inherit;text-transform:uppercase;
  transition:background .15s,border-color .18s,transform .08s;
  display:none;white-space:nowrap
}
#tod-btn:active{transform:translateX(-50%) scale(.93)}
#tod-btn.show{display:block}
#tod-btn.is-day{
  border-color:rgba(255,200,80,.5);
  color:rgba(255,230,150,.95)
}
#tod-btn.is-night{
  border-color:rgba(140,160,255,.5);
  color:rgba(180,200,255,.95)
}
#time-display{
  position:fixed;top:14px;right:14px;z-index:30;
  background:rgba(10,8,6,.72);backdrop-filter:blur(14px);
  border:1px solid rgba(255,200,120,.18);
  border-radius:20px;padding:5px 13px;
  font-size:11px;font-weight:700;letter-spacing:.12em;
  color:rgba(255,220,160,.88);
  pointer-events:none
}

/* ── STAR CANVAS (night sky — behind 3D canvas) ─────── */
#star-canvas{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;opacity:0;
  transition:opacity 2s ease
}
#star-canvas.visible{opacity:1}

/* ── INVENTORY BAR — Minecraft cozy wooden chest style ── */
#inv-bar{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%);
  z-index:30;
  display:flex;align-items:center;gap:6px;
  padding:10px 14px 14px;
  background:
    linear-gradient(180deg, #2a1a0a 0%, #1e1208 40%, #160e06 100%);
  border-top:3px solid #8b6020;
  border-left:3px solid #8b6020;
  border-right:3px solid #8b6020;
  border-radius:12px 12px 0 0;
  box-shadow:
    0 -4px 0 0 #5a3a10 inset,
    0 4px 24px rgba(0,0,0,.7),
    0 0 0 1px #3a2408;
  pointer-events:all;
  max-width:100vw;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  /* Wood grain texture */
  background-image:
    repeating-linear-gradient(
      180deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px
    ),
    linear-gradient(180deg, #3a2010 0%, #2a1608 100%);
}
/* Chest label strip at top */
#inv-bar::before{
  content:'🎒 Inventory';
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:800;letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(255,210,140,.85);
  background:linear-gradient(180deg,#3a2010,#2a1608);
  border:2px solid #8b6020;
  border-bottom:none;
  border-radius:8px 8px 0 0;
  padding:3px 12px 1px;
  white-space:nowrap;
  box-shadow:0 -2px 8px rgba(0,0,0,.4)
}
.inv-slot{
  width:54px;height:54px;
  /* Minecraft-style slot: dark square with inset shadow */
  background:linear-gradient(135deg,#0e0a06 0%,#1a1008 60%,#221408 100%);
  border:2px solid #5a3a10;
  border-radius:4px;
  box-shadow:
    2px 2px 0 0 rgba(0,0,0,.6) inset,
    -1px -1px 0 0 rgba(255,200,100,.08) inset,
    0 0 0 1px #3a2208;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1px;
  cursor:pointer;touch-action:manipulation;
  flex-shrink:0;
  transition:border-color .1s,box-shadow .1s,transform .08s;
  position:relative;
  image-rendering:pixelated
}
.inv-slot:hover{
  border-color:#c8882a;
  box-shadow:
    2px 2px 0 0 rgba(0,0,0,.6) inset,
    -1px -1px 0 0 rgba(255,200,100,.15) inset,
    0 0 8px rgba(200,140,40,.3),
    0 0 0 1px #3a2208
}
.inv-slot:active{transform:scale(.93)}
.inv-slot.selected{
  border-color:#f0c040;
  background:linear-gradient(135deg,#1a1206 0%,#261a08 60%,#301e0a 100%);
  box-shadow:
    2px 2px 0 0 rgba(0,0,0,.5) inset,
    -1px -1px 0 0 rgba(255,220,120,.2) inset,
    0 0 12px rgba(240,190,60,.4),
    0 0 0 1px #806010
}
/* Golden shimmer on selected */
.inv-slot.selected::after{
  content:'';position:absolute;inset:0;border-radius:3px;
  background:linear-gradient(135deg,rgba(255,220,80,.08) 0%,transparent 60%);
  pointer-events:none
}
.inv-slot .slot-icon{
  font-size:24px;line-height:1;
  filter:drop-shadow(1px 1px 0 rgba(0,0,0,.8))
}
.inv-slot .slot-label{
  font-size:6.5px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,205,140,.65);
  white-space:nowrap;
  text-shadow:0 1px 2px rgba(0,0,0,.9)
}
.inv-slot .slot-count{
  position:absolute;bottom:3px;right:4px;
  font-size:8px;font-weight:900;
  color:rgba(255,255,255,.9);
  text-shadow:1px 1px 0 rgba(0,0,0,.9),-1px -1px 0 rgba(0,0,0,.9),
              1px -1px 0 rgba(0,0,0,.9),-1px 1px 0 rgba(0,0,0,.9);
  letter-spacing:0;
  font-family:monospace
}

/* Place button — Minecraft style */
#place-btn{
  background:linear-gradient(180deg,#5a8a20 0%,#3a6010 50%,#2a4a08 100%) !important;
  border:2px solid #8ab030 !important;
  border-radius:4px !important;
  box-shadow:2px 2px 0 #1a3008,0 0 0 1px #2a5010 !important;
  color:#d4ff80 !important;
  font-size:9px !important;
  font-weight:900 !important;
  letter-spacing:.12em !important;
  padding:8px 14px !important;
  text-shadow:0 1px 2px rgba(0,0,0,.8) !important;
  transition:transform .08s,filter .1s !important
}
#place-btn:active{transform:scale(.93) translateY(1px) !important;filter:brightness(.85) !important}



/* ── INTERACTION TOAST (replaces emoji bubble) ─── */
#emote-bubble{
  position:fixed;left:50%;top:40%;
  transform:translate(-50%,-50%) scale(.85) translateY(6px);
  z-index:25;pointer-events:none;opacity:0;
  font-size:10px;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(255,235,200,.9);
  background:rgba(20,12,6,.72);
  border:1px solid rgba(255,200,130,.22);
  border-radius:50px;
  padding:6px 16px;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  white-space:nowrap;
  transition:opacity .3s ease,transform .35s cubic-bezier(.34,1.56,.64,1)
}
#emote-bubble.show{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0)}

/* ═══════════════════════════════════════════════════
   PLAY SCREEN — full-screen landing overlay
═══════════════════════════════════════════════════ */
#play-screen{
  position:fixed;inset:0;z-index:400;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(168deg,#0e0806 0%,#1c0f08 40%,#120a12 100%);
  transition:opacity .9s ease,visibility .9s ease
}
#play-screen.fade-out{opacity:0;visibility:hidden;pointer-events:none}

/* Decorative grain overlay */
#play-screen::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.35;pointer-events:none
}

/* Soft radial warm glow behind title */
#play-screen::after{
  content:'';position:absolute;
  width:420px;height:420px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(200,80,20,.12) 0%,transparent 70%);
  pointer-events:none
}

#play-title{
  position:relative;z-index:1;
  text-align:center;margin-bottom:52px
}
#play-title h1{
  font-size:clamp(22px,6vw,42px);
  font-weight:300;
  color:rgba(255,215,155,.92);
  letter-spacing:.35em;
  text-transform:uppercase;
  text-shadow:0 0 40px rgba(220,120,30,.3),0 2px 16px rgba(0,0,0,.8);
  margin-bottom:10px
}
#play-title p{
  font-size:clamp(9px,2vw,12px);
  color:rgba(255,190,120,.38);
  letter-spacing:.25em;
  text-transform:uppercase
}

/* Decorative line */
#play-title .divider{
  width:48px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,180,80,.45),transparent);
  margin:14px auto
}

#play-btn{
  position:relative;z-index:1;
  background:rgba(255,240,220,.08);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:rgba(255,225,185,.92);
  border:1px solid rgba(255,200,130,.3);
  border-radius:50px;
  padding:14px 44px;
  font-size:12px;font-weight:700;
  letter-spacing:.28em;text-transform:uppercase;
  font-family:inherit;
  cursor:pointer;touch-action:manipulation;
  box-shadow:0 0 0 0 rgba(255,160,60,0),0 4px 24px rgba(0,0,0,.45);
  transition:background .2s,border-color .2s,box-shadow .25s,transform .12s;
  outline:none
}
#play-btn:hover{
  background:rgba(255,230,195,.15);
  border-color:rgba(255,200,120,.52);
  box-shadow:0 0 0 4px rgba(255,160,60,.08),0 6px 28px rgba(0,0,0,.5)
}
#play-btn:active{transform:scale(.95)}
/* subtle breathing pulse on idle */
@keyframes pulse-border{
  0%,100%{box-shadow:0 0 0 0 rgba(255,160,60,0),0 4px 24px rgba(0,0,0,.45)}
  50%{box-shadow:0 0 0 6px rgba(255,160,60,.07),0 4px 24px rgba(0,0,0,.45)}
}
#play-btn{animation:pulse-border 3s ease-in-out infinite}

/* Small hint text below button */
#play-hint{
  position:relative;z-index:1;
  margin-top:22px;
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,180,100,.22)
}

/* ═══════════════════════════════════════════════════
   SCENE TRANSITION FADE
═══════════════════════════════════════════════════ */
#scene-fade{
  position:fixed;inset:0;z-index:200;
  background:#0e0806;
  opacity:0;pointer-events:none;
  transition:opacity .45s ease
}
#scene-fade.visible{opacity:1;pointer-events:all}

/* ── LOADING SCREEN ───────────────────────────── */
#ld{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#0e0806,#1a0e0a,#0a0e16);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;transition:opacity .7s ease
}
#ld.go{opacity:0;pointer-events:none}
#ld h2{
  color:rgba(255,210,140,.9);font-size:20px;font-weight:300;
  letter-spacing:.38em;text-transform:uppercase;margin-bottom:30px;
  text-shadow:0 0 30px rgba(255,160,60,.3)
}
.lb{width:190px;height:2px;background:rgba(255,180,80,.12);border-radius:2px;overflow:hidden}
.lf{height:100%;width:0%;background:linear-gradient(90deg,#d4640a,#f5b04a);border-radius:2px;transition:width .08s linear}
</style>
</head>
<body>

<!-- ═══════════════ PLAY SCREEN ═══════════════ -->
<div id="play-screen">
  <div id="play-title">
    <h1>Felicity's World</h1>
    <div class="divider"></div>
    <p>A peaceful place to wander</p>
  </div>
  <button id="play-btn">Play</button>
  <div id="play-hint">Touch to begin</div>
</div>

<!-- Scene transition fade overlay -->
<div id="scene-fade"></div>

<!-- Loading screen -->
<div id="ld">
  <h2>Felicity's World</h2>
  <div class="lb"><div class="lf" id="lbar"></div></div>
</div>

<!-- Star canvas BEHIND 3D scene — rendered first -->
<canvas id="star-canvas"></canvas>
<!-- Time of day display -->
<div id="time-display">🌸 Day</div>

<!-- Canvas — has transparent background set by renderer when needed -->
<canvas id="c"></canvas>

<!-- Camera view toggle (Minecraft-style) -->
<button id="cam-btn">View</button>
<!-- Day / Night manual toggle -->
<button id="tod-btn">☀️ Day</button>

<!-- Name labels -->
<div id="lbl-f" class="lbl lbl-f">Felicity</div>
<div id="lbl-c" class="lbl lbl-c">Chris</div>

<!-- Enter / exit house -->
<div id="enter-btn"><button id="ehb">Enter House</button></div>
<button id="exit-btn">Outside</button>

<!-- Action buttons — clean text, no emojis -->
<div id="action-panel">
  <button class="act-btn" id="hug-btn">Hug</button>
  <button class="act-btn" id="hold-btn">Hold Hands</button>
</div>

<!-- Interaction toast -->
<div id="emote-bubble">Together</div>

<!-- Inventory bar -->
<div id="inv-bar">
  <div class="inv-slot selected" data-item="flower" id="slot-flower">
    <span class="slot-icon">🌸</span>
    <span class="slot-label">Flower</span>
    <span class="slot-count" id="cnt-flower">∞</span>
  </div>
  <div class="inv-slot" data-item="tulip" id="slot-tulip">
    <span class="slot-icon">🌷</span>
    <span class="slot-label">Tulip</span>
    <span class="slot-count" id="cnt-tulip">∞</span>
  </div>
  <div class="inv-slot" data-item="mushroom" id="slot-mushroom">
    <span class="slot-icon">🍄</span>
    <span class="slot-label">Mushroom</span>
    <span class="slot-count" id="cnt-mushroom">∞</span>
  </div>
  <div class="inv-slot" data-item="stone" id="slot-stone">
    <span class="slot-icon">🪨</span>
    <span class="slot-label">Stone</span>
    <span class="slot-count" id="cnt-stone">∞</span>
  </div>
  <div class="inv-slot" data-item="lantern" id="slot-lantern">
    <span class="slot-icon">🏮</span>
    <span class="slot-label">Lantern</span>
    <span class="slot-count" id="cnt-lantern">∞</span>
  </div>
  <div class="inv-slot" data-item="tree" id="slot-tree">
    <span class="slot-icon">🌳</span>
    <span class="slot-label">Tree</span>
    <span class="slot-count" id="cnt-tree">∞</span>
  </div>
</div>

<!-- HUD overlay -->
<div id="hud">
  <div id="title">
    <h1>Felicity's World</h1>
    <p>A peaceful place to wander</p>
  </div>
  <div id="jz"></div>
  <div id="info">WASD · Joystick · Move</div>
</div>

<!-- THREE.js r128 CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- nipplejs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

function mkBox(w,h,d,color){
  return new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color:color})
  );
}
function addBox(scene,w,h,d,color,x,y,z,parent){
  var m=mkBox(w,h,d,color);
  m.position.set(x,y,z);
  m.castShadow=true;m.receiveShadow=true;
  if(parent){parent.add(m);}else{scene.add(m);}
  return m;
}
function sceneBox(sc,w,h,d,color,x,y,z){return addBox(sc,w,h,d,color,x,y,z,null);}

function makeTulip(x,z,colorHex,scl){
  scl=scl||1;
  var g=new THREE.Group();
  // Stem
  var stem=new THREE.Mesh(
    new THREE.CylinderGeometry(.028*scl,.036*scl,.55*scl,6),

  );
  stem.position.y=.28*scl;g.add(stem);
  // Leaf
  var leaf=new THREE.Mesh(
    new THREE.CylinderGeometry(.01,.06,.38*scl,4),
    tulipStemMat
  );
  leaf.position.set(.06*scl,.22*scl,0);leaf.rotation.z=0.5;g.add(leaf);
  // Petal cone (tulip cup)
  var petMat=new THREE.MeshLambertMaterial({color:colorHex});
  var petGeo=new THREE.ConeGeometry(.14*scl,.28*scl,6,1,true);
  var pet=new THREE.Mesh(petGeo,petMat);
  pet.position.y=.62*scl;g.add(pet);
  // Inner yellow center
  var ctr=new THREE.Mesh(
    new THREE.SphereGeometry(.07*scl,6,5),
    new THREE.MeshLambertMaterial({color:0xffee88})
  );
  ctr.position.y=.72*scl;g.add(ctr);

  g.position.set(x,0,z);
  g.rotation.y=Math.random()*Math.PI*2;
  OUT.add(g);
  TULIPS.push({g:g,origY:0,idx:Math.random()*100});
  return g;
}

function buildChar(scene,isFel){

  // ── TORSO / BODY (added to G — never animated, correct) ────
  if(isFel){
    // Skirt layers
    a(b(.82,.14,.60,0xff4499),0,.76,0);
    a(b(.78,.20,.58,0xff66aa),0,.92,0);
    a(b(.72,.12,.54,0xff88cc),0,1.06,0);

    a(b(.66,.68,.52,0xffeef6),0,1.38,0);
    // Shoulder panels
    a(b(.18,.72,.52,0xff6eb4),-.32,1.42,0);
    a(b(.18,.72,.52,0xff6eb4),.32,1.42,0);
  } else {
    // Belt
    a(b(.78,.12,.48,0x1a1208),0,1.08,0);
    // Torso/shirt
    a(b(.80,.74,.56,0x1e3a6e),0,1.47,0);
    // Shoulders
    a(b(.18,.18,.56,0x223f76),-.46,1.78,0);

// ─────────────────────────────────────────────────────────────
//  CAT COMPANION — follows the group at a slight distance
//  Built from a few boxes/spheres: body, head, ears, tail
// ─────────────────────────────────────────────────────────────
function buildCat(scene){
  var G=new THREE.Group();
  var bodyMat =new THREE.MeshLambertMaterial({color:0xb07848}); // warm tabby orange
  var darkMat =new THREE.MeshLambertMaterial({color:0x7a4a28});
  var whiteMat=new THREE.MeshLambertMaterial({color:0xfff4e8});
  var eyeMat  =new THREE.MeshLambertMaterial({color:0x22aa44});
  var noseMat =new THREE.MeshLambertMaterial({color:0xffaaaa});

  function b(w,h,d,mat,x,y,z){
    var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z);m.castShadow=true;G.add(m);return m;
  }
  function s(r,mat,x,y,z){
    var m=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),mat);
    m.position.set(x,y,z);m.castShadow=true;G.add(m);return m;
  }

  // Body
  b(0.52,0.38,0.7,bodyMat, 0,0.28,0);
  // Belly patch
  b(0.28,0.24,0.56,whiteMat,0,0.24,0.04);
  // Stripe markings
  b(0.54,0.06,0.12,darkMat,0,0.42,-0.22);
  b(0.54,0.06,0.12,darkMat,0,0.42,-0.02);

  // Neck
  b(0.24,0.22,0.22,bodyMat,0,0.52,0.26);

  // Head (sphere)
  var head=s(0.24,bodyMat,0,0.78,0.24);
  // Forehead stripe
  b(0.1,0.06,0.08,darkMat,0,0.88,0.42);
  // Eyes
  s(0.055,eyeMat,  -0.1,0.82,0.42);
  s(0.055,eyeMat,   0.1,0.82,0.42);
  s(0.025,new THREE.MeshLambertMaterial({color:0x000000}),-0.1,0.82,0.46);
  s(0.025,new THREE.MeshLambertMaterial({color:0x000000}), 0.1,0.82,0.46);
  // Eye shine
  s(0.014,whiteMat,-0.085,0.835,0.47);
  s(0.014,whiteMat, 0.115,0.835,0.47);
  // Nose
  b(0.07,0.05,0.04,noseMat,0,0.72,0.45);
  // Mouth lines
  b(0.04,0.04,0.04,darkMat,-0.06,0.67,0.44);
  b(0.04,0.04,0.04,darkMat, 0.06,0.67,0.44);
  // Whisker lines (flat planes)
  b(0.22,0.014,0.02,whiteMat,-0.22,0.73,0.42);
  b(0.22,0.014,0.02,whiteMat, 0.22,0.73,0.42);
  b(0.18,0.014,0.02,whiteMat,-0.2, 0.69,0.43);
  b(0.18,0.014,0.02,whiteMat, 0.2, 0.69,0.43);

  // Ears (pointy boxes)
  var earL=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.16,0.06),bodyMat);
  earL.position.set(-0.14,0.98,0.22);earL.rotation.z= 0.28;G.add(earL);
  var earR=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.16,0.06),bodyMat);
  earR.position.set( 0.14,0.98,0.22);earR.rotation.z=-0.28;G.add(earR);
  // Inner ear
  var eiL=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.1,0.04),noseMat);
  eiL.position.set(-0.14,0.96,0.24);eiL.rotation.z= 0.28;G.add(eiL);
  var eiR=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.1,0.04),noseMat);
  eiR.position.set( 0.14,0.96,0.24);eiR.rotation.z=-0.28;G.add(eiR);

  // Legs (4 small boxes)
  [[-0.14,0.1, 0.2],[ 0.14,0.1, 0.2],[-0.14,0.1,-0.2],[ 0.14,0.1,-0.2]].forEach(function(l){
    b(0.14,0.24,0.16,bodyMat,l[0],l[1],l[2]);
    b(0.12,0.06,0.18,whiteMat,l[0],0,l[2]+0.02);
  });

  // Tail — group so we can wag it
  var tailGroup=new THREE.Group();
  tailGroup.position.set(0,0.32,-0.34);
  // Tail segment 1
  var t1=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.14,0.32),bodyMat);
  t1.position.set(0,0.08,-0.14);tailGroup.add(t1);
  // Tail segment 2 (tip, curling up)
  var t2=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.28,0.1),bodyMat);
  t2.position.set(0,0.28,-0.28);tailGroup.add(t2);
  // Tail tip white
  var t3=new THREE.Mesh(new THREE.SphereGeometry(0.08,6,5),whiteMat);
  t3.position.set(0,0.44,-0.28);tailGroup.add(t3);
  G.add(tailGroup);

  G._tail=tailGroup;
  G._walkTime=0;
  scene.add(G);
  return G;
}

  if(keys.ArrowUp||keys.KeyW)y--;if(keys.ArrowDown||keys.KeyS)y++;
  var l=Math.sqrt(x*x+y*y);if(l){x/=l;y/=l;}return{x:x,y:y};
}

var MTN_C=[[-46,-46,10],[-28,-52,9],[0,-55,12],[30,-51,10],[49,-46,10],[-53,-20,9],[-53,7,8],[53,-20,9],[53,7,8],[-39,-39,7],[39,-39,7]];
var BOUND=42;

function blockedOut(nx,nz){
  if(nx>HOUSE.position.x-5.0&&nx<HOUSE.position.x+5.0&&nz>HOUSE.position.z-4.5&&nz<HOUSE.position.z+6.2)return true;
  for(var t=0;t<TREE_POS.length;t++){var dx=nx-TREE_POS[t][0],dz=nz-TREE_POS[t][1];if(dx*dx+dz*dz<TREE_R*TREE_R)return true;}
  for(var m=0;m<MTN_C.length;m++){var mx=nx-MTN_C[m][0],mz=nz-MTN_C[m][1],mr=MTN_C[m][2];if(mx*mx+mz*mz<mr*mr)return true;}
  return false;
}
// ── Indoor collision — matches room layout ──────────────────
// Room: x: -9→+9, z: -8→+8. Spawn (0, FLOOR_Y, 2.5) clear.
function blockedIn(nx,nz){
  // Outer walls
  if(nx<-8.7||nx>8.7||nz>7.5||nz<-7.7) return true;
  // Front door gap (always passable): x -2.5→2.5, z 7.5→8
  // Sofa — back of living room
  if(nx>-3.5&&nx<3.5&&nz>2.4&&nz<4.8) return true;
  // Coffee table — slightly smaller than mesh
  if(nx>-2.2&&nx<2.2&&nz>0.2&&nz<2.3) return true;
  // Armchair
  if(nx>-3.8&&nx<-1.3&&nz>-0.6&&nz<1.7) return true;
  // Divider wall left (x≈-3, z<-0.5)
  if(nx>-3.2&&nx<-2.8&&nz<-0.5) return true;
  // Divider wall right (x≈3, z<-2)
  if(nx>2.8&&nx<3.2&&nz<-2.0) return true;
  // Bed (back-left bedroom)
  if(nx<-3.8&&nx>-8.4&&nz>-5.8&&nz<-0.2) return true;
  // Wardrobe
  if(nx<-5.8&&nz<-5.6) return true;
  // Bookshelf
  if(nx<-6.6&&nz>-3.0&&nz<-0.8) return true;
  // Fireplace
  if(nx<-3.8&&nz<-6.5) return true;
  // Kitchen counter (right back)
  if(nx>4.5&&nz<-5.4) return true;
  // Dining table
  if(nx>3.3&&nx<7.8&&nz>-4.2&&nz<-1.6) return true;
  // Floor lamp (just a small bump)
  if(nx<-7.0&&nx>-8.2&&nz>2.4&&nz<3.6) return true;
  return false;
}
function tryMove(pos,mx,mz,speed,dt,blockFn){
  var nx=pos.x+mx*speed*dt,nz=pos.z+mz*speed*dt;
  nx=Math.max(-BOUND,Math.min(BOUND,nx));nz=Math.max(-BOUND,Math.min(BOUND,nz));
  if(!blockFn(nx,nz)){pos.x=nx;pos.z=nz;return;}
  var nx2=Math.max(-BOUND,Math.min(BOUND,pos.x+mx*speed*dt));
  if(!blockFn(nx2,pos.z)){pos.x=nx2;return;}
  var nz2=Math.max(-BOUND,Math.min(BOUND,pos.z+mz*speed*dt));
  if(!blockFn(pos.x,nz2))pos.z=nz2;
}

// ─────────────────────────────────────────────────────────────
//  LIMB ANIMATION — separated so hug arms never clobber walk legs
// ─────────────────────────────────────────────────────────────
var SWING=0.55;
// Walk legs only (arms driven separately)
function walkLegs(ch,ph){
  var sw=Math.sin(ph)*SWING;
  ch._lLeg.rotation.x=sw;
  ch._rLeg.rotation.x=-sw;
}
// Walk arms only
function walkArms(ch,ph){
  var sw=Math.sin(ph)*SWING;
  ch._lArm.rotation.x=-sw*0.65;
  ch._rArm.rotation.x= sw*0.65;
}
// Full walk (both)
function animLimbs(ch,ph){
  walkLegs(ch,ph);
  walkArms(ch,ph);
}
// Decay all rotations toward 0
function idleLimbs(ch){
  ch._lLeg.rotation.x*=.85; ch._rLeg.rotation.x*=.85;
  ch._lLeg.rotation.z*=.85; ch._rLeg.rotation.z*=.85;
  ch._lArm.rotation.x*=.85; ch._rArm.rotation.x*=.85;
  ch._lArm.rotation.z*=.85; ch._rArm.rotation.z*=.85;
}
// Snap all rotations instantly to 0
function resetLimbs(ch){
  ch._lLeg.rotation.set(0,0,0);
  ch._rLeg.rotation.set(0,0,0);
  ch._lArm.rotation.set(0,0,0);
  ch._rArm.rotation.set(0,0,0);
}

  var types=[{col:0xff4488,emiss:0xff1155,sz:.13},{col:0xff88bb,emiss:0xff4488,sz:.10},{col:0xffdd55,emiss:0xffaa00,sz:.10},{col:0xff99cc,emiss:0xff5599,sz:.12},{col:0xffffff,emiss:0xffccdd,sz:.08}];
  var t=types[Math.floor(Math.random()*types.length)];
  var geo=Math.random()>.4?new THREE.SphereGeometry(t.sz,5,4):new THREE.OctahedronGeometry(t.sz*.9,0);
  var h=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:t.col,emissive:new THREE.Color(t.emiss),emissiveIntensity:2.2,transparent:true,opacity:1.0}));

  hearts.push({m:h,vy:.9+Math.random()*.5,vx:(Math.random()-.5)*.4,vz:(Math.random()-.5)*.3,spin:spin,t:0,scene:scene});
}
function updateHearts(dt){
  for(var hi=hearts.length-1;hi>=0;hi--){
    var h=hearts[hi];h.t+=dt;h.vy-=dt*0.4;
    h.m.position.y+=h.vy*dt;h.m.position.x+=h.vx*dt;h.m.position.z+=h.vz*dt;
    h.m.rotation.y+=h.spin*dt;h.m.rotation.z+=h.spin*.5*dt;
    var life=h.t/1.5;h.m.material.opacity=Math.max(0,1.0-life*life);

  }
}

// ─────────────────────────────────────────────────────────────
//  2.5D PIXEL-ART SPRITE CHARACTERS
//  Matches reference: big chibi head, proper outfit, 3 walk frames
// ─────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────
//  PIXEL ART SPRITE SYSTEM
//  Canvas: 32×48 px drawn at 4× = 128×192 actual pixels
//  Frames: 0=idle, 1=walk_a, 2=walk_b, 3=hug, 4=hold_hand
// ─────────────────────────────────────────────────────────────
function drawPixelSprite(isFel, frameIdx){
  var S=4; // scale factor — 4px per logical pixel
  var W=32, H=48;
  var canvas=document.createElement('canvas');
  canvas.width=W*S; canvas.height=H*S;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  function px(x,y,w,h,col){
    ctx.fillStyle=col;
    ctx.fillRect(x*S,y*S,(w||1)*S,(h||1)*S);
  }
  function circle(cx,cy,r,col){
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.arc(cx*S+S/2,cy*S+S/2,r*S,0,Math.PI*2);
    ctx.fill();
  }

  if(isFel){
    // ═══════════════════ FELICITY ═══════════════════
    // Reference: long black hair, black dress, white collar, knee-high boots

    // ── Leg positions by frame ──
    var ll=[12,33], rl=[18,33]; // idle
    if(frameIdx===1){ ll=[11,32]; rl=[19,34]; }
    else if(frameIdx===2){ ll=[13,34]; rl=[17,32]; }
    else if(frameIdx===3){ ll=[13,33]; rl=[17,33]; } // hug — legs together
    else if(frameIdx===4){ ll=[12,33]; rl=[19,33]; } // hold hand

    // Knee-high black boots
    px(ll[0]-1,ll[1]+3,5,6,'#151010'); // left boot
    px(rl[0]-1,rl[1]+3,5,6,'#151010'); // right boot
    // Boot highlight
    px(ll[0],ll[1]+4,2,1,'#2a1818');
    px(rl[0],rl[1]+4,2,1,'#2a1818');

    // Socks / lower leg (white)
    px(ll[0],ll[1],4,4,'#f8f8f8');
    px(rl[0],rl[1],4,4,'#f8f8f8');

    // Skirt — black, slightly flared
    px(9,26,14,8,'#1a1a1a');
    px(8,29,16,5,'#222222'); // wider at bottom
    px(7,31,18,3,'#1a1a1a'); // hem

    // Dress body — black
    px(11,18,10,10,'#1a1a1a');
    // White collar / bow
    px(13,18,6,3,'#f5f5f5');
    px(14,20,4,2,'#e8e8e8');
    px(15,22,2,2,'#f5f5f5'); // bow knot

    // Arms — frame dependent
    var laY=frameIdx===1?19:frameIdx===2?21:frameIdx===3?17:20;
    var raY=frameIdx===1?21:frameIdx===2?19:frameIdx===3?17:20;
    if(frameIdx===4){ laY=19; raY=18; } // hold hand — one arm reaches out
    // Left arm (skin)
    px(7,laY,5,9,'#ffd6b0');
    px(6,laY+7,5,3,'#ffc9a0'); // hand
    // Right arm (skin)
    px(20,raY,5,9,'#ffd6b0');
    px(20,raY+7,5,3,'#ffc9a0'); // hand

    // Hold hand override — right arm reaches right
    if(frameIdx===4){
      px(20,17,5,6,'#ffd6b0');
      px(24,18,4,3,'#ffc9a0'); // extended hand
    }
    // Hug override — arms wrap forward
    if(frameIdx===3){
      px(6,18,6,8,'#ffd6b0');
      px(20,18,6,8,'#ffd6b0');
      px(5,23,7,3,'#ffc9a0');
      px(20,23,7,3,'#ffc9a0');
    }

    // Neck
    px(14,14,4,5,'#ffd6b0');

// Build animated sprite with 5 frames: idle, walkA, walkB, hug, holdHand
function buildSpriteChar(scene,isFel){
  var G=new THREE.Group();

  var frames=[
    drawPixelSprite(isFel,0), // idle
    drawPixelSprite(isFel,1), // walk a
    drawPixelSprite(isFel,2), // walk b
    drawPixelSprite(isFel,3), // hug
    drawPixelSprite(isFel,4), // hold hand
  ];

  var mat=new THREE.MeshBasicMaterial({
    map:frames[0],
    transparent:true,
    alphaTest:0.05,
    side:THREE.DoubleSide,
    depthWrite:false
  });

  // 2.5D — taller plane, chibi proportions
  var mesh=new THREE.Mesh(new THREE.PlaneGeometry(1.6,2.4), mat);
  mesh.position.y=1.2; // feet sit on floor
  G.add(mesh);

  G._sprite=mesh;
  G._frames=frames;
  G._mat=mat;
  G._frameTime=0;
  G._curFrame=0;
  G._stateFrame=0; // forced frame by game state

  // Ground shadow
  var shadowMat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.20,depthWrite:false});
  var shadow=new THREE.Mesh(new THREE.CircleGeometry(0.52,12),shadowMat);
  shadow.rotation.x=-Math.PI/2;
  shadow.position.y=0.01;
  G.add(shadow);

  var dummy=new THREE.Group();
  G._lArm=dummy; G._rArm=dummy; G._lLeg=dummy; G._rLeg=dummy;
  G._isDummy=true;

  scene.add(G);
  return G;
}

// Animate sprite frame — respects forced state frames (hug=3, hold=4)
function updateSpriteAnim(ch, moving, dt){
  if(!ch||!ch._isDummy||!ch._frames)return;

  var stateF=ch._stateFrame||0;

  if(stateF>=3){
    // Hug (3) or Hold Hand (4) state
    if(moving){
      // WALK animation plays even during hug/hold — cycle frames 1↔2
      ch._frameTime+=dt;
      if(ch._frameTime>0.16){
        ch._frameTime=0;
        // Alternate between walk frames 1 and 2
        var nextF=ch._curFrame===1?2:1;
        ch._curFrame=nextF;
        ch._mat.map=ch._frames[nextF];
        ch._mat.needsUpdate=true;
      }
    } else {
      // Stationary — show the state pose (hug/hold frame)
      if(ch._curFrame!==stateF){
        ch._curFrame=stateF;
        ch._mat.map=ch._frames[stateF];
        ch._mat.needsUpdate=true;
      }
    }
    return;
  }

  // Normal idle/walk
  if(moving){
    ch._frameTime+=dt;
    if(ch._frameTime>0.16){
      ch._frameTime=0;
      ch._curFrame=ch._curFrame===1?2:1;
      ch._mat.map=ch._frames[ch._curFrame];
      ch._mat.needsUpdate=true;
    }
  } else {
    if(ch._curFrame!==0){
      ch._curFrame=0;
      ch._mat.map=ch._frames[0];
      ch._mat.needsUpdate=true;
    }
  }
}

// Set sprite to a named state
function setSpriteState(ch, state){
  if(!ch||!ch._isDummy)return;
  // states: 'idle'=0, 'walk'=auto, 'hug'=3, 'hold'=4
  if(state==='hug')  ch._stateFrame=3;
  else if(state==='hold') ch._stateFrame=4;
  else ch._stateFrame=0;
}

// Sprite always faces the camera
function updateSpriteFacing(sprite,cam){
  if(!sprite._sprite)return;
  var cp=cam.position;
  // Compute angle from sprite to camera in WORLD space
  var angle=Math.atan2(cp.x-sprite.position.x, cp.z-sprite.position.z);
  // Counteract parent's Y rotation so sprite always faces camera
  sprite._sprite.rotation.y=angle-sprite.rotation.y;
  // Also ensure sprite is upright (no tilt inherited from parent)
  sprite._sprite.rotation.x=0;
  sprite._sprite.rotation.z=0;
}

  return ((Math.round(ar+(br-ar)*t)<<16)|(Math.round(ag+(bg-ag)*t)<<8)|(Math.round(ab2+(bb2-ab2)*t)));
}

function snapSkyNow(){

function applySkyState(from,to,t){
  t=Math.max(0,Math.min(1,t));
  var ei=function(a,b){return a+(b-a)*t;};
  var ec=function(a,b){return lerpColor(a,b,t);};
  OUT.background.setHex(ec(from.bg,to.bg));
  sun.color.setHex(ec(from.sunC,to.sunC)); sun.intensity=ei(from.sunI,to.sunI);
  hemi.color.setHex(ec(from.hSky,to.hSky)); hemi.groundColor.setHex(ec(from.hGrd,to.hGrd)); hemi.intensity=ei(from.hInt,to.hInt);
  OUT.children.forEach(function(c){if(c.isAmbientLight){c.color.setHex(ec(from.ambC,to.ambC));c.intensity=ei(from.ambI,to.ambI);}});
  var nf=ei(from.nf,to.nf);
  fireflyNightFrac=nf; starMat.opacity=ei(from.sa,to.sa); starMat.needsUpdate=true;
  moon.visible=nf>0.1; moonLight.intensity=nf*0.9;
  if(ground&&ground.material) ground.material.color.setHex(ec(nf>0.5?0x2a3820:0x4a7a30,to.nf>0.5?0x2a3820:0x4a7a30));
}

// Advance tod lerp each frame (called from animate())
function tickTODLerp(dt){
  if(!todActive||!todLerpFrom||!todLerpTo) return;
  todLerpT+=dt;
  var t=Math.min(1,todLerpT/todLerpDur);
  // Ease in-out
  t=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  applySkyState(todLerpFrom,todLerpTo,t);
  if(todLerpT>=todLerpDur) todActive=false;
}

function updateDayNight(){
  // Always update clock display regardless of override
  var pt=getPHTime();
  var hh=pt.h.toString().padStart(2,'0');
  var mm=pt.m.toString().padStart(2,'0');

  if(manualTOD!==null){
    // Manual mode: show badge + real time, don't touch sky (lerp handles it)
    var badge=manualTOD==='day'?'☀️':'🌙';
    timeDisplay.textContent=badge+' '+hh+':'+mm+' PH';
    return;
  }

  // Real-time PH mode
  var h=pt.h,m2=pt.m,hf=h+m2/60;
  var ss=getSkyState(h),next=getSkyState(h+1>=24?0:h+1);
  var frac=Math.max(0,Math.min(1,(hf-ss[0])/(ss[1]-ss[0]||1)));

  OUT.background.setHex(lerpColor(ss[2],next[2],frac));
  sun.color.setHex(lerpColor(ss[3],next[3],frac)); sun.intensity=ss[4]+(next[4]-ss[4])*frac;
  var sa=(hf/24)*Math.PI*2-Math.PI/2;
  sun.position.set(Math.cos(sa)*40,Math.sin(sa)*35,20);
  hemi.color.setHex(lerpColor(ss[5],next[5],frac)); hemi.groundColor.setHex(lerpColor(ss[6],next[6],frac)); hemi.intensity=ss[7]+(next[7]-ss[7])*frac;
  OUT.children.forEach(function(c){if(c.isAmbientLight){c.color.setHex(lerpColor(ss[8],next[8],frac));c.intensity=ss[9]+(next[9]-ss[9])*frac;}});
  var nf=0;
  if(h>=0&&h<5)nf=1;else if(h>=5&&h<6)nf=1-(hf-5);else if(h>=19&&h<21)nf=(hf-19)/2;else if(h>=21)nf=1;
  nf=Math.max(0,Math.min(1,nf));
  starMat.opacity=nf; starMat.needsUpdate=true;
  var ma=sa+Math.PI;
  moon.position.set(Math.cos(ma)*80,Math.abs(Math.sin(ma))*55+10,Math.sin(ma)*40);
  moonLight.position.copy(moon.position); moon.visible=nf>0.1; moonLight.intensity=nf*0.9;
  if(ground&&ground.material) ground.material.color.setHex(nf>0.5?0x2a3820:0x4a7a30);
  fireflyNightFrac=nf;
  OUT.children.forEach(function(c){if(c.isAmbientLight){var mi=nf*0.18;if(c.intensity<mi)c.intensity=mi;}});
  timeDisplay.textContent=ss[11]+' '+hh+':'+mm+' PH';
}

var _hugFelTarget=new THREE.Vector3();
var _hugChrisTarget=new THREE.Vector3();

// ─────────────────────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────────────────────
var wt=0,cwt=0,iwt=0,icwt=0,elapsed=0,fireFlicker=0;
var OSPEED=5.5,CSPD=5.2,ISPEED=4.2;
var camP=new THREE.Vector3(),camL=new THREE.Vector3();
var inCamP=new THREE.Vector3(),inCamL=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),.05);
  elapsed+=dt;
  // Smooth day/night manual transition
  tickTODLerp(dt);

  // ── BIRDS ────────────────────────────────────────────────────
  birds.forEach(function(bg){
    bg._t+=dt*.6;
    bg.position.x=bg._cx+Math.cos(bg._t)*bg._cr;
    bg.position.z=bg._cz+Math.sin(bg._t)*bg._cr;
    bg.position.y=11+Math.sin(bg._t*2.2)*1.5+bg._rx;
    bg.rotation.y=-bg._t+Math.PI/2;
    bg.rotation.z=Math.sin(bg._t*3)*.12;
    bg._wL.rotation.z=Math.sin(elapsed*8)*0.45+0.1;
    bg._wR.rotation.z=-Math.sin(elapsed*8)*0.45-0.1;
  });

  // ── FROGS ────────────────────────────────────────────────────
  frogs.forEach(function(fg){
    fg._t+=dt;
    if(fg._t>fg._nextHop){fg._hopT=0;fg._t=0;fg._nextHop=2+Math.random()*3;fg._hx=(Math.random()-.5)*1.2;fg._hz=(Math.random()-.5)*1.2;}
    if(fg._hopT<.5){fg._hopT+=dt*3;var ht=Math.sin(fg._hopT*Math.PI);fg.position.y=.08+ht*.35;fg.position.x=fg._baseX+(fg._hx||0)*(fg._hopT/1.5||0);fg.position.z=fg._baseZ+(fg._hz||0)*(fg._hopT/1.5||0);}
    else{fg.position.y=.08;}
  });

  // ── BUTTERFLIES — Feature #4 ─────────────────────────────────
  butterflies.forEach(function(bf){
    bf.t+=dt*bf.speed;
    // Orbital flight path with gentle bobbing
    bf.g.position.x=bf.cx+Math.cos(bf.t)*bf.r+Math.sin(bf.t*0.7)*0.8;
    bf.g.position.y=bf.cy+Math.sin(bf.t*1.3)*0.5+Math.cos(bf.t*0.5)*0.3;
    bf.g.position.z=bf.cz+Math.sin(bf.t)*bf.r*0.6+Math.cos(bf.t*0.9)*0.6;
    // Face direction of travel
    bf.g.rotation.y=bf.t+Math.PI/2;
    // Wing flap — realistic butterfly flutter (fast up, slow down)
    var flapAngle=Math.abs(Math.sin(elapsed*6+bf.t*2))*1.1-0.15;
    bf.wLp.rotation.y= flapAngle;
    bf.wRp.rotation.y=-flapAngle;
    // Gentle tilt
    bf.g.rotation.z=Math.sin(bf.t*1.2)*.18;
  });

  // ── TULIPS gentle sway — Feature #4 ─────────────────────────
  TULIPS.forEach(function(tl){
    tl.g.rotation.z=Math.sin(elapsed*0.9+tl.idx)*0.04;
    tl.g.rotation.x=Math.sin(elapsed*0.7+tl.idx*1.3)*0.02;
  });

  // ── Hearts ───────────────────────────────────────────────────
  updateHearts(dt);

  // ── Fire flicker ─────────────────────────────────────────────
  fireFlicker+=dt*8;
  fireL.intensity=1.4+Math.sin(fireFlicker)*.55+Math.sin(fireFlicker*1.7)*.22;
  fireMeshes.forEach(function(fm,i){fm.scale.y=.85+Math.sin(fireFlicker*(1.1+i*.25))*.22;fm.rotation.y=elapsed*(2+i);});
  lanternGlows.forEach(function(ll){ll.intensity=.58+Math.sin(elapsed*2.1+ll.position.x)*.1;});
  if(intLight) intLight.intensity=.65+Math.sin(elapsed*1.7)*.12;
  if(kitchenL) kitchenL.intensity=.85+Math.sin(elapsed*1.9)*.1;
  if(interiorWarmLight) interiorWarmLight.intensity=2.0+Math.sin(elapsed*1.3)*.28;
  if(lampGlow) lampGlow.intensity=1.0+Math.sin(elapsed*2.1)*.15;

  // Input
  var kb=kbIn();
  var rawX=jIn.on?jIn.x:kb.x, rawZ=jIn.on?-jIn.y:kb.y;  // joystick up (+) => move forward (-Z)

  // Camera-relative movement so joystick "up" always moves away from camera
  // In top-down (mode 0) and sky (mode 2): world-space Z- is forward = rawZ as-is
  // In follow (mode 1): rotate input by camera's Y angle so up = forward on screen
  var mx=rawX, mz=rawZ;
  // Follow mode now uses fixed world-space offset — no input remapping needed.
  // rawX = strafe left/right, rawZ = forward/back (same as top-down).
  // No camera-relative rotation so holding right never spins 360.
  var moving=Math.abs(mx)>.015||Math.abs(mz)>.015;

  if(insideHouse){
    // ══════════════════════════════════════════════════════════
    //  INDOOR — single authoritative animation dispatcher
    //  Rule: each character's limbs are set EXACTLY ONCE per frame
    // ══════════════════════════════════════════════════════════

    // ── Felicity movement & rotation ─────────────────────────
    if(moving && !hugActive){
      iwt+=dt;
      tryMove(inFel.position,mx,mz,ISPEED,dt,blockedIn);
      var ta=Math.atan2(mx,mz),da=ta-inFel.rotation.y;
      while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
      inFel.rotation.y+=da*Math.min(1,dt*12);
    } else if(moving && hugActive){
      iwt+=dt;
      tryMove(inFel.position,mx,mz,ISPEED*0.55,dt,blockedIn);
      var ta2=Math.atan2(mx,mz),da2=ta2-inFel.rotation.y;
      while(da2>Math.PI)da2-=Math.PI*2; while(da2<-Math.PI)da2+=Math.PI*2;
      inFel.rotation.y+=da2*Math.min(1,dt*8);
    } else {
      if(!hugActive) iwt=0;
    }

    // ── Felicity Y (floor-clamped bob) ───────────────────────
    inFel.position.y = FLOOR_Y + (moving ? Math.abs(Math.sin(iwt*9))*0.04 : Math.abs(Math.sin(elapsed*1.4))*0.018);

    // ── HUG ─────────────────────────────────────────────────
    if(hugActive){
      hugTimer+=dt;
      var hDx=inFel.position.x-inChris.position.x;
      var hDz=inFel.position.z-inChris.position.z;
      var hDist=Math.sqrt(hDx*hDx+hDz*hDz);
      if(hDist>0.01){
        _hugChrisTarget.set(
          inFel.position.x-(hDx/hDist)*0.92,
          FLOOR_Y,
          inFel.position.z-(hDz/hDist)*0.92
        );
      }
      inChris.position.lerp(_hugChrisTarget, Math.min(1,dt*6));
      // During hug: characters face each other for positioning logic
      // but their sprites will still be camera-facing via updateSpriteFacing
      inChris.rotation.y=Math.atan2(hDx,hDz);
      inFel.rotation.y  =Math.atan2(-hDx,-hDz);
      // Sprites face camera independently — no override needed (updateSpriteFacing handles it)

      // ── Chris Y during hug
      inChris.position.y = FLOOR_Y + (moving ? Math.abs(Math.sin(iwt*9))*0.04 : Math.abs(Math.sin(elapsed*1.8))*0.018);

      // ── LIMBS: one call each, no doubles ─────────────────
      if(moving){
        walkLegs(inFel,  iwt*9);
        walkLegs(inChris,iwt*9);
      } else {
        idleLimbs(inFel);
        idleLimbs(inChris);
      }
      // Arms in hug pose — smooth interpolated
      var sway=Math.sin(elapsed*1.6)*0.06;
      var hugBlend=Math.min(1,hugTimer*3.5); // 0→1 over ~0.28s
      var targetArmX = -1.1 + sway;
      var targetArmZ = 0.82;
      inFel._lArm.rotation.x  += (targetArmX  - inFel._lArm.rotation.x)*dt*8;
      inFel._rArm.rotation.x  += (targetArmX  - inFel._rArm.rotation.x)*dt*8;
      inFel._lArm.rotation.z  += (-targetArmZ - inFel._lArm.rotation.z)*dt*8;
      inFel._rArm.rotation.z  += (targetArmZ  - inFel._rArm.rotation.z)*dt*8;
      inChris._lArm.rotation.x+= (targetArmX  - inChris._lArm.rotation.x)*dt*8;
      inChris._rArm.rotation.x+= (targetArmX  - inChris._rArm.rotation.x)*dt*8;
      inChris._lArm.rotation.z+= (-targetArmZ - inChris._lArm.rotation.z)*dt*8;
      inChris._rArm.rotation.z+= (targetArmZ  - inChris._rArm.rotation.z)*dt*8;

      // Hearts
      if(Math.floor(hugTimer*7)>Math.floor((hugTimer-dt)*7)){
        for(var _hi2=0;_hi2<3;_hi2++){
          spawnHeart(IN,
            (inFel.position.x+inChris.position.x)/2+(Math.random()-.5)*0.7,
            2.8+Math.random()*0.5,
            (inFel.position.z+inChris.position.z)/2+(Math.random()-.5)*0.7
          );
        }
      }

    // ── HOLD HANDS ─────────────────────────────────────────
    } else if(holdHandActive){
      if(Math.random()<dt*1.5){
        spawnHeart(IN, inFel.position.x+(Math.random()-.5)*0.4, 2.5+Math.random()*0.8, inFel.position.z+(Math.random()-.5)*0.4);
      }
      var sY=Math.sin(inFel.rotation.y), cY=Math.cos(inFel.rotation.y);

      // relative to Felicity. Does NOT use outFel.rotation.y so holding
      // joystick left/right never spins the camera 360 degrees.
      camP.set(outFel.position.x, outFel.position.y+9, outFel.position.z+11);
      outCam.position.lerp(camP, dt*6);
      camL.copy(outFel.position); camL.y+=1.2;
      outCam.lookAt(camL);
    } else {
      // Sky view — tilted to see horizon + stars at night
      camP.set(outFel.position.x, 48, outFel.position.z+18);
      outCam.position.lerp(camP,dt*4);
      var skyLookAt=new THREE.Vector3(outFel.position.x, 2, outFel.position.z-8);
      outCam.lookAt(skyLookAt);
    }

    // Door proximity
    _dpv.set(outFel.position.x,0,outFel.position.z);
    var wasNear=doorNear;
    doorNear=_dpv.distanceTo(DOOR_POS)<4.5;
    if(doorNear!==wasNear){if(doorNear)enterBtn.classList.add('show');else enterBtn.classList.remove('show');}

    // Sprite frame + facing outdoors
    updateSpriteAnim(outFel, moving, dt);
    updateSpriteAnim(outChris, moving, dt);
    updateSpriteFacing(outFel,outCam);
    updateSpriteFacing(outChris,outCam);
    // Pop-in animation for placed items
    for(var pi2=placedItems.length-1;pi2>=0;pi2--){
      var pm=placedItems[pi2];
      if(pm._popT<1){
        pm._popT+=dt*3;
        var sc=Math.min(1,pm._popT);
        // Overshoot spring
        var spring=sc<0.7?(sc/0.7):(1+(1-sc/1)*0.3*Math.sin((sc-0.7)/0.3*Math.PI));
        pm.scale.setScalar(Math.max(0,spring));
      }
    }
    // ── FIREFLIES (night only) ─────────────────────────────
    if(fireflyNightFrac > 0.05){
      for(var _ffi=0;_ffi<fireflyMeshes.length;_ffi++){
        var _ff = fireflyData[_ffi];
        var _fm = fireflyMeshes[_ffi];
        // Drift slowly
        _ff.baseX += _ff.driftX;
        _ff.baseZ += _ff.driftZ;
        // Bounce back if too far
        if(Math.abs(_ff.baseX)>30 || Math.abs(_ff.baseZ+14)>30){
          _ff.driftX *= -1; _ff.driftZ *= -1;
        }
        // Gentle floating
        _ff.phase += dt * _ff.speed;
        _fm.position.x = _ff.baseX + Math.sin(_ff.phase)*0.4;
        _fm.position.y = _ff.baseY + Math.sin(_ff.phase*1.3)*0.35;
        _fm.position.z = _ff.baseZ + Math.cos(_ff.phase*0.8)*0.3;
        // Blink on/off
        _ff.blinkPhase += dt * _ff.blinkSpeed;
        var blinkVal = (Math.sin(_ff.blinkPhase)*0.5+0.5);
        blinkVal = Math.pow(blinkVal, 3); // sharper blink
        var ffOpacity = fireflyNightFrac * blinkVal * 0.95;
        _fm.material.opacity = ffOpacity;
        _fm.material.emissiveIntensity = 2.5 + blinkVal * 2.5;
        _fm.visible = fireflyNightFrac > 0.05;
      }
    } else {
      for(var _ffi2=0;_ffi2<fireflyMeshes.length;_ffi2++){
        fireflyMeshes[_ffi2].visible = false;
      }
    }

    renderer.render(OUT,outCam);
    updateLabel(lblF,outFel,3.5,outCam);
    updateLabel(lblC,outChris,3.9,outCam);
  }
}

// ─────────────────────────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────────────────────────
window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  outCam.aspect=W/H;outCam.updateProjectionMatrix();
  inCam.left=-IN_ORTHO_H*(W/H); inCam.right=IN_ORTHO_H*(W/H);
  inCam.top=IN_ORTHO_H; inCam.bottom=-IN_ORTHO_H;
  inCam.updateProjectionMatrix();
  renderer.setSize(W,H);
});

// ─────────────────────────────────────────────────────────────
//  START — called only after Play button is clicked
// ─────────────────────────────────────────────────────────────
function startGame(){
  lbar.style.width='100%';
  // Interior is 100% procedural — buildCozyInterior() already ran at startup.
  // No GLB loading needed; avoids all ProgressEvent / 404 errors.
  setTimeout(function(){
    clearInterval(lint);
    var ld=document.getElementById('ld');
    if(ld){ld.classList.add('go');setTimeout(function(){if(ld.parentNode)ld.parentNode.removeChild(ld);},800);}
    animate();
  },400);
}

// ─────────────────────────────────────────────────────────────
//  Pre-load progress bar starts immediately on page open
//  but game only renders after Play is clicked
// ─────────────────────────────────────────────────────────────
// (lint interval already started at top of script)

</script>
