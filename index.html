<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Felicity's World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0e0a;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',system-ui,sans-serif}
#c{display:block;width:100%;height:100%;position:absolute;top:0;left:0}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}

/* ── TITLE — top-left, small, unobtrusive ── */
#title{
  position:absolute;top:14px;left:14px;text-align:left;pointer-events:none
}
#title h1{
  font-size:clamp(11px,2.2vw,14px);font-weight:800;
  color:rgba(255,220,140,.95);letter-spacing:.22em;text-transform:uppercase;
  text-shadow:0 0 14px rgba(255,100,0,.5),1px 1px 4px rgba(0,0,0,.9)
}
#title p{font-size:8px;color:rgba(255,200,100,.4);letter-spacing:.14em;margin-top:1px}

/* ── JOYSTICK ── */
#jz{position:absolute;bottom:96px;left:22px;width:120px;height:120px;pointer-events:all;touch-action:none}
.nipple .front{background:rgba(255,220,160,.85)!important}
.nipple .back{background:rgba(255,200,120,.15)!important;border:2px solid rgba(255,200,110,.35)!important}

/* ── CORNER INFO ── */
#info{position:absolute;bottom:18px;right:14px;text-align:right;font-size:8px;color:rgba(255,200,120,.28);letter-spacing:.05em;line-height:1.8}

/* ── NAME LABELS ── */
.lbl{position:fixed;pointer-events:none;transform:translate(-50%,-100%);font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 9px;border-radius:10px;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.9);z-index:7;backdrop-filter:blur(4px)}
.lbl-f{background:rgba(255,80,140,.25);border:1px solid rgba(255,140,190,.5);color:#ffc0e8}
.lbl-c{background:rgba(60,120,255,.25);border:1px solid rgba(100,160,255,.5);color:#b8d8ff}

/* ══════════════════════════════════════════════════════════════
   STARDEW VALLEY STYLE BUTTONS
   Warm wooden pixel-art look — brown gradient, pixel border
════════════════════════════════════════════════════════════════ */
.sv-btn{
  font-family:'Courier New',Courier,monospace;
  cursor:pointer;touch-action:manipulation;
  background:linear-gradient(to bottom,#c8942a 0%,#9a6418 40%,#7a4a10 100%);
  border:3px solid #3e1e06;
  outline:none;
  box-shadow:
    0 0 0 1.5px #c89030,
    3px 4px 0 #2a1004,
    inset 0 1px 0 rgba(255,230,140,.55);
  border-radius:5px;
  color:#fff8dc;
  font-size:11px;font-weight:900;letter-spacing:.08em;
  text-shadow:1px 1px 0 rgba(0,0,0,.85);
  text-transform:uppercase;
  padding:8px 16px;
  white-space:nowrap;
  transition:filter .08s;
  image-rendering:pixelated
}
.sv-btn:active{
  transform:translate(2px,3px);
  box-shadow:
    0 0 0 1.5px #c89030,
    1px 1px 0 #2a1004,
    inset 0 1px 0 rgba(255,230,140,.55);
  filter:brightness(.9)
}
.sv-btn:hover{filter:brightness(1.12)}

/* Active state (toggled on) */
.sv-btn.sv-active{
  background:linear-gradient(to bottom,#e8a030 0%,#c07020 40%,#9a5010 100%);
  border-color:#5a2800;
  box-shadow:
    0 0 0 1.5px #e8b040,
    3px 4px 0 #3a1800,
    inset 0 1px 0 rgba(255,240,160,.65)
}

/* Small icon variant */
.sv-btn-sm{padding:5px 11px;font-size:10px}

/* ── EXIT BUTTON ── top-left, hidden by default */
#exit-btn{
  position:fixed;top:12px;left:12px;z-index:60;display:none
}

/* ── FULLSCREEN BUTTON ── bottom-right corner ── */
#fs-btn{
  position:fixed;bottom:96px;right:12px;z-index:40;
  width:42px;height:42px;padding:0;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(to bottom,#c8942a,#7a4a10);
  border:2.5px solid #3e1e06;border-radius:8px;
  box-shadow:0 0 0 1.5px #c89030,2px 3px 0 #2a1004;
  color:#fff8dc;cursor:pointer;touch-action:manipulation;
  transition:filter .08s;pointer-events:all
}
#fs-btn:active{transform:translate(1px,2px);filter:brightness(.88)}
#fs-btn:hover{filter:brightness(1.15)}

/* ── CAM + TOD — top-right cluster ── */
#cam-btn{
  position:fixed;top:12px;right:12px;z-index:30;display:none
}
#cam-btn.show{display:block}
#tod-btn{
  position:fixed;top:52px;right:12px;z-index:30;display:none
}
#tod-btn.show{display:block}

/* ── ACTION PANEL — right side, stacked ── */
#action-panel{
  position:fixed;right:12px;bottom:88px;
  z-index:20;display:flex;flex-direction:column;gap:8px;pointer-events:all
}
.act-btn{min-width:118px;text-align:center}

/* ── ENTER BUTTON ── */
#enter-btn{
  position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);
  z-index:20;pointer-events:none;opacity:0;transition:opacity .25s,top .25s
}
#enter-btn.show{opacity:1;pointer-events:all;top:50%}
#enter-btn button{
  background:linear-gradient(to bottom,#c8942a,#7a4a10);
  border:3px solid #3e1e06;
  box-shadow:0 0 0 1.5px #c89030,3px 4px 0 #2a1004,inset 0 1px 0 rgba(255,230,140,.5);
  border-radius:5px;padding:11px 24px;
  color:#fff8dc;font-size:13px;font-weight:900;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;font-family:'Courier New',monospace;
  touch-action:manipulation;text-shadow:1px 1px 0 rgba(0,0,0,.8)
}
#enter-btn button:active{transform:translate(2px,3px)}

/* ── EMOTE BUBBLE ── */
#emote-bubble{
  position:fixed;left:50%;top:28%;transform:translateX(-50%);
  background:rgba(10,6,2,.88);border:2px solid rgba(255,200,100,.35);
  border-radius:14px;padding:6px 18px;color:rgba(255,225,160,.9);
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  backdrop-filter:blur(8px);z-index:25;pointer-events:none;
  opacity:0;transition:opacity .3s;text-shadow:0 1px 4px rgba(0,0,0,.8)
}
#emote-bubble.show{opacity:1}

/* ── TIME DISPLAY ── */
#time-display{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(10,6,2,.75);border:2px solid rgba(255,200,100,.3);
  border-radius:18px;padding:4px 14px;color:rgba(255,220,140,.88);
  font-size:10px;font-weight:700;letter-spacing:.12em;
  backdrop-filter:blur(8px);z-index:25;pointer-events:none;
  text-shadow:0 1px 3px rgba(0,0,0,.8)
}

/* ── PLAY SCREEN ── */
#play-screen{
  position:fixed;inset:0;z-index:300;
  background:radial-gradient(ellipse at center,#2a1608 0%,#0e0804 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  opacity:1;transition:opacity .6s
}
#play-screen.fade-out{opacity:0;pointer-events:none}
#play-title{text-align:center}
#play-title h1{font-size:clamp(22px,5vw,36px);font-weight:900;color:rgba(255,220,140,.95);letter-spacing:.28em;text-transform:uppercase;text-shadow:0 0 30px rgba(255,120,0,.6),0 2px 12px rgba(0,0,0,.9)}
#play-title p{font-size:11px;color:rgba(255,190,100,.45);letter-spacing:.2em;margin-top:6px}
.divider{width:80px;height:2px;background:linear-gradient(to right,transparent,rgba(255,200,100,.5),transparent);margin:10px auto}
#play-btn{
  background:linear-gradient(to bottom,#c8942a,#7a4a10);
  border:3px solid #3e1e06;border-radius:5px;
  box-shadow:0 0 0 1.5px #c89030,4px 5px 0 #2a1004,inset 0 1px 0 rgba(255,230,140,.5);
  color:#fff8dc;font-size:15px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;font-family:'Courier New',monospace;touch-action:manipulation;
  padding:12px 36px;text-shadow:1px 1px 0 rgba(0,0,0,.8)
}
#play-btn:active{transform:translate(3px,4px)}
#play-hint{font-size:10px;color:rgba(255,200,100,.3);letter-spacing:.2em;text-transform:uppercase}

/* ── LOADING ── */
#ld{
  position:fixed;inset:0;z-index:200;background:#0e0804;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .5s;
  opacity:0;pointer-events:none;
}
#ld.fade{opacity:0;pointer-events:none}
#ld.show{opacity:1;pointer-events:all}
#ld h2{font-size:22px;font-weight:900;color:rgba(255,210,120,.88);letter-spacing:.3em;text-transform:uppercase;text-shadow:0 0 20px rgba(255,100,0,.5)}
.lb{width:200px;height:8px;background:rgba(255,200,100,.15);border-radius:4px;border:1px solid rgba(255,200,100,.2);overflow:hidden}
.lf{width:0%;height:100%;background:linear-gradient(to right,#c8942a,#ffcc44);border-radius:4px;transition:width .3s}

/* ── SCENE FADE ── */
#scene-fade{
  position:fixed;inset:0;background:#0e0804;z-index:50;
  opacity:0;pointer-events:none;transition:opacity .4s
}
#scene-fade.active{opacity:1;pointer-events:all}

/* ── STAR CANVAS ── */
#star-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* ══════════════════════════════════════════════════════════════
   INVENTORY
════════════════════════════════════════════════════════════════ */
#inv-toggle{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  z-index:31;
  background:linear-gradient(to bottom,#6a3c14,#4a2408);
  border:3px solid #3e1e06;border-bottom:none;
  box-shadow:0 0 0 1.5px #8b5a20,2px 0 0 #2a1004;
  border-radius:8px 8px 0 0;
  color:rgba(255,220,130,.9);font-size:10px;font-weight:900;letter-spacing:.14em;
  text-transform:uppercase;font-family:'Courier New',monospace;
  cursor:pointer;touch-action:manipulation;
  padding:5px 18px 4px;white-space:nowrap;pointer-events:all;
  transition:bottom .3s cubic-bezier(.4,0,.2,1);text-shadow:1px 1px 0 rgba(0,0,0,.8)
}
#inv-toggle.inv-open{bottom:var(--inv-h,78px)}
#inv-toggle:active{filter:brightness(.85)}

#inv-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  z-index:30;display:flex;align-items:center;gap:6px;
  padding:10px 14px 14px;
  background:
    repeating-linear-gradient(180deg,transparent 0px,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px),
    linear-gradient(180deg,#4a2808 0%,#2e1604 100%);
  border-top:3px solid #8b5a20;border-left:3px solid #8b5a20;border-right:3px solid #8b5a20;
  box-shadow:0 0 0 1.5px #c89030 inset,0 4px 20px rgba(0,0,0,.6);
  border-radius:10px 10px 0 0;
  pointer-events:all;max-width:100vw;overflow-x:auto;-webkit-overflow-scrolling:touch;
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .28s
}
#inv-bar.hidden{transform:translateX(-50%) translateY(100%);opacity:0;pointer-events:none}
#inv-bar::before{
  content:'🎒 Bag';
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,210,130,.8);font-family:'Courier New',monospace;
  background:linear-gradient(180deg,#4a2808,#2e1604);
  border:2px solid #8b5a20;border-bottom:none;border-radius:7px 7px 0 0;
  padding:3px 11px 1px;white-space:nowrap;text-shadow:1px 1px 0 rgba(0,0,0,.8)
}
.inv-slot{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(0,0,0,.35);border:2px solid rgba(200,148,40,.28);
  border-radius:5px;padding:7px 10px;cursor:pointer;
  touch-action:manipulation;transition:background .12s,border-color .12s;
  min-width:62px;position:relative
}
.inv-slot.selected,.inv-slot:hover{
  background:rgba(200,148,40,.2);border-color:rgba(255,200,80,.7)
}
.slot-icon{font-size:22px;line-height:1}
.slot-label{font-size:7px;font-weight:700;color:rgba(255,210,130,.7);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;font-family:'Courier New',monospace}
.slot-count{position:absolute;bottom:3px;right:5px;font-size:8px;font-weight:900;color:rgba(255,220,140,.8);font-family:'Courier New',monospace}
#place-btn{
  background:linear-gradient(to bottom,#508020,#2c4a10);
  border:3px solid #1a2a06;border-radius:5px;
  box-shadow:0 0 0 1.5px #80b830,2px 3px 0 #1a2a06,inset 0 1px 0 rgba(180,255,100,.4);
  color:#e8ffd0;font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;font-family:'Courier New',monospace;touch-action:manipulation;
  padding:8px 14px;text-shadow:1px 1px 0 rgba(0,0,0,.7);white-space:nowrap
}
#place-btn:active{transform:translate(1px,2px)}
</style>
</head>
<body>

<!-- ═══════════════ PLAY SCREEN ═══════════════ -->
<div id="play-screen">
  <div id="play-title">
    <h1>Felicity's World</h1>
    <div class="divider"></div>
    <p>A peaceful place to wander</p>
  </div>
  <button id="play-btn">Play</button>
  <div id="play-hint">Touch to begin</div>
</div>

<!-- Scene transition fade overlay -->
<div id="scene-fade"></div>

<!-- Loading screen -->
<div id="ld">
  <h2>Felicity's World</h2>
  <div class="lb"><div class="lf" id="lbar"></div></div>
</div>

<!-- Star canvas BEHIND 3D scene — rendered first -->
<canvas id="star-canvas"></canvas>
<!-- Time of day display -->
<div id="time-display">🌸 Day</div>

<!-- Canvas — has transparent background set by renderer when needed -->
<canvas id="c"></canvas>

<!-- Camera view toggle (Minecraft-style) -->
<button id="cam-btn" class="sv-btn sv-btn-sm">📷 View</button>
<!-- Day / Night manual toggle -->
<button id="tod-btn" class="sv-btn sv-btn-sm">☀️ Day</button>
<!-- Fullscreen toggle -->
<button id="fs-btn" title="Fullscreen">⛶</button>

<!-- Name labels -->
<div id="lbl-f" class="lbl lbl-f">Felicity</div>
<div id="lbl-c" class="lbl lbl-c">Chris</div>

<!-- Enter / exit house -->
<div id="enter-btn"><button id="ehb">Enter House</button></div>
<button id="exit-btn" class="sv-btn sv-btn-sm">← Outside</button>

<!-- Action buttons — clean text, no emojis -->
<div id="action-panel">
  <button class="sv-btn act-btn" id="hug-btn">🤗 Hug</button>
  <button class="sv-btn act-btn" id="hold-btn">🤝 Hold Hands</button>
</div>

<!-- Interaction toast -->
<div id="emote-bubble">Together</div>

<!-- Inventory minimize toggle -->
<button id="inv-toggle" class="inv-open">▼ BAG</button>

<!-- Inventory bar -->
<div id="inv-bar">
  <div class="inv-slot selected" data-item="flower" id="slot-flower">
    <span class="slot-icon">🌸</span>
    <span class="slot-label">Flower</span>
    <span class="slot-count" id="cnt-flower">∞</span>
  </div>
  <div class="inv-slot" data-item="tulip" id="slot-tulip">
    <span class="slot-icon">🌷</span>
    <span class="slot-label">Tulip</span>
    <span class="slot-count" id="cnt-tulip">∞</span>
  </div>
  <div class="inv-slot" data-item="mushroom" id="slot-mushroom">
    <span class="slot-icon">🍄</span>
    <span class="slot-label">Mushroom</span>
    <span class="slot-count" id="cnt-mushroom">∞</span>
  </div>
  <div class="inv-slot" data-item="stone" id="slot-stone">
    <span class="slot-icon">🪨</span>
    <span class="slot-label">Stone</span>
    <span class="slot-count" id="cnt-stone">∞</span>
  </div>
  <div class="inv-slot" data-item="lantern" id="slot-lantern">
    <span class="slot-icon">🏮</span>
    <span class="slot-label">Lantern</span>
    <span class="slot-count" id="cnt-lantern">∞</span>
  </div>
  <div class="inv-slot" data-item="tree" id="slot-tree">
    <span class="slot-icon">🌳</span>
    <span class="slot-label">Tree</span>
    <span class="slot-count" id="cnt-tree">∞</span>
  </div>
</div>

<!-- HUD overlay -->
<div id="hud">
  <div id="title">
    <h1>Felicity's World</h1>
    <p>A peaceful place to wander</p>
  </div>
  <div id="jz"></div>
  <div id="info">WASD · Joystick · Move</div>
</div>

function mkBox(w,h,d,color){
  return new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color:color})
  );
}
function addBox(scene,w,h,d,color,x,y,z,parent){
  var m=mkBox(w,h,d,color);
  m.position.set(x,y,z);
  m.castShadow=true;m.receiveShadow=true;
  if(parent){parent.add(m);}else{scene.add(m);}
  return m;
}
function sceneBox(sc,w,h,d,color,x,y,z){return addBox(sc,w,h,d,color,x,y,z,null);}

// ── SUN RAYS (God Rays) ──────────────────────────────────────
// Thin transparent planes radiating from the sun position
// Sun is at position (-30,14,20) world space — rays fan down-forward
var sunRayMeshes=[];
(function(){
  var NUM_RAYS=8;
  // Base directions spread around the sun angle
  var sunDir=new THREE.Vector3(-30,14,20).normalize();
  for(var ri=0;ri<NUM_RAYS;ri++){
    var spread=(ri/NUM_RAYS)*Math.PI*2;
    // Each ray is a long thin plane, slightly tilted from sun direction
    var rayGeo=new THREE.PlaneGeometry(2.5+Math.random()*2, 55+Math.random()*20);
    var rayMat=new THREE.MeshBasicMaterial({
      color:0xffcc77,
      transparent:true,
      opacity:0.04+Math.random()*0.04,
      depthWrite:false,
      side:THREE.DoubleSide,
      blending:THREE.AdditiveBlending
    });
    var ray=new THREE.Mesh(rayGeo,rayMat);
    // Position ray in the sky — offset from sun direction
    var px=sunDir.x*60 + Math.cos(spread)*8;
    var py=sunDir.y*30 + Math.sin(ri*1.3)*5;
    var pz=sunDir.z*40 + Math.sin(spread)*8;
    ray.position.set(px,py,pz);
    // Align ray to point from sun toward ground
    ray.lookAt(px*0.1+Math.cos(spread)*3, -5, pz*0.1+Math.sin(spread)*3);
    ray.rotation.z+=spread*0.3;
    OUT.add(ray);
    sunRayMeshes.push({mesh:ray,baseOpacity:rayMat.opacity,phase:Math.random()*Math.PI*2,speed:0.3+Math.random()*0.4});
  }
})();

  // Petal cone (tulip cup)
  var petMat=new THREE.MeshLambertMaterial({color:colorHex});

//          Bedroom     (left,   x -4→-8)

var FLOOR_Y=0.14;                                    // top surface of floor mesh

function buildCozyInterior(){
  // ══════════════════════════════════════════════════════════════════
  //  COZY COTTAGE INTERIOR — warm, rich, Stardew-Valley-inspired
  //  One open room: living area (front), kitchen (right back),
  //  sleeping nook (left back).  Spawn: x=0 z=2.5
  // ══════════════════════════════════════════════════════════════════

  function M(col){ return new THREE.MeshLambertMaterial({color:col}); }
  function MS(col,emiss,ei){
    return new THREE.MeshStandardMaterial({color:col,
      emissive:new THREE.Color(emiss),emissiveIntensity:ei,roughness:0.65});
  }
  function box(w,h,d,col,x,y,z,parent){
    var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
      col instanceof THREE.Material?col:M(col));
    m.position.set(x,y,z);
    m.castShadow=true; m.receiveShadow=true;
    (parent||IN).add(m); return m;
  }
  function cyl(rt,rb,h,col,x,y,z,seg){
    var m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg||8),
      col instanceof THREE.Material?col:M(col));
    m.position.set(x,y,z);
    (IN).add(m); return m;
  }
  function sph(r,col,x,y,z){
    var m=new THREE.Mesh(new THREE.SphereGeometry(r,10,8),
      col instanceof THREE.Material?col:M(col));
    m.position.set(x,y,z); IN.add(m); return m;
  }
  function ctex(w,h,fn){
    var cv=document.createElement('canvas');cv.width=w;cv.height=h;
    var cx=cv.getContext('2d');fn(cx,w,h);
    var t=new THREE.CanvasTexture(cv);
    t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;
  }
  function flatBox(w,d,col,x,z,yOff){
    var m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),
      col instanceof THREE.Material?col:M(col));
    m.rotation.x=-Math.PI/2;m.position.set(x,yOff||0.015,z);
    m.receiveShadow=true;IN.add(m);return m;
  }

  // ── FLOOR ──────────────────────────────────────────────────────
  // Warm oak hardwood planks
  var floorT=ctex(512,512,function(cx,W,H){
    var plankW=Math.round(W/6);
    var cols=['#c8843a','#bf7a32','#ca8840','#b87230','#cc8e3e'];
    var offset=0;
    for(var row=0;row<H;row+=24){
      offset=(offset+plankW*1.7)%(plankW*2);
      for(var col2=-(plankW-(offset%plankW));col2<W;col2+=plankW){
        cx.fillStyle=cols[Math.floor(Math.random()*cols.length)];
        cx.fillRect(col2,row,plankW-2,22);
        // wood grain
        cx.strokeStyle='rgba(0,0,0,0.07)';cx.lineWidth=1;
        for(var g=0;g<3;g++){
          cx.beginPath();cx.moveTo(col2+g*8,row);cx.lineTo(col2+g*8+4,row+22);cx.stroke();
        }
      }
    }
  });
  floorT.repeat.set(3,3);
  var floorM=new THREE.MeshLambertMaterial({map:floorT});
  var floor=new THREE.Mesh(new THREE.PlaneGeometry(20,18),floorM);
  floor.rotation.x=-Math.PI/2;floor.position.set(0,0.01,0);
  floor.receiveShadow=true;IN.add(floor);

  // ── CEILING ─────────────────────────────────────────────────────
  var ceilT=ctex(256,256,function(cx,W,H){
    cx.fillStyle='#f0e0c8';cx.fillRect(0,0,W,H);
    cx.strokeStyle='rgba(160,120,80,0.15)';cx.lineWidth=1;
    for(var i=0;i<W;i+=32){cx.beginPath();cx.moveTo(i,0);cx.lineTo(i,H);cx.stroke();}
    for(var j=0;j<H;j+=32){cx.beginPath();cx.moveTo(0,j);cx.lineTo(W,j);cx.stroke();}
  });
  ceilT.repeat.set(4,3);
  var ceilM=new THREE.MeshLambertMaterial({map:ceilT,side:THREE.BackSide});
  var ceil=new THREE.Mesh(new THREE.PlaneGeometry(20,18),ceilM);
  ceil.rotation.x=Math.PI/2;ceil.position.set(0,3.6,0);IN.add(ceil);

  // ── WALLS ──────────────────────────────────────────────────────
  // Warm beige plaster with wooden wainscoting
  var wallT=ctex(256,128,function(cx,W,H){
    // upper wall — warm plaster
    cx.fillStyle='#e8d0a8';cx.fillRect(0,0,W,H*0.65);
    // subtle texture

function buildCat(scene){
  var G=new THREE.Group();

  var darkMat =new THREE.MeshLambertMaterial({color:0x7a4a28});

  function b(w,h,d,mat,x,y,z){
    var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z);m.castShadow=true;G.add(m);return m;
  }
  function s(r,mat,x,y,z){
    var m=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),mat);
    m.position.set(x,y,z);m.castShadow=true;G.add(m);return m;
  }

  // Body
  b(0.52,0.38,0.7,bodyMat, 0,0.28,0);
  // Belly patch
  b(0.28,0.24,0.56,whiteMat,0,0.24,0.04);
  // Stripe markings
  b(0.54,0.06,0.12,darkMat,0,0.42,-0.22);
  b(0.54,0.06,0.12,darkMat,0,0.42,-0.02);

  // Neck
  b(0.24,0.22,0.22,bodyMat,0,0.52,0.26);

  // Head (sphere)
  var head=s(0.24,bodyMat,0,0.78,0.24);
  // Forehead stripe
  b(0.1,0.06,0.08,darkMat,0,0.88,0.42);
  // Eyes
  s(0.055,eyeMat,  -0.1,0.82,0.42);
  s(0.055,eyeMat,   0.1,0.82,0.42);
  s(0.025,new THREE.MeshLambertMaterial({color:0x000000}),-0.1,0.82,0.46);
  s(0.025,new THREE.MeshLambertMaterial({color:0x000000}), 0.1,0.82,0.46);
  // Eye shine
  s(0.014,whiteMat,-0.085,0.835,0.47);
  s(0.014,whiteMat, 0.115,0.835,0.47);
  // Nose
  b(0.07,0.05,0.04,noseMat,0,0.72,0.45);
  // Mouth lines
  b(0.04,0.04,0.04,darkMat,-0.06,0.67,0.44);
  b(0.04,0.04,0.04,darkMat, 0.06,0.67,0.44);
  // Whisker lines (flat planes)
  b(0.22,0.014,0.02,whiteMat,-0.22,0.73,0.42);
  b(0.22,0.014,0.02,whiteMat, 0.22,0.73,0.42);
  b(0.18,0.014,0.02,whiteMat,-0.2, 0.69,0.43);
  b(0.18,0.014,0.02,whiteMat, 0.2, 0.69,0.43);

  // Ears (pointy boxes)
  var earL=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.16,0.06),bodyMat);
  earL.position.set(-0.14,0.98,0.22);earL.rotation.z= 0.28;G.add(earL);
  var earR=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.16,0.06),bodyMat);
  earR.position.set( 0.14,0.98,0.22);earR.rotation.z=-0.28;G.add(earR);
  // Inner ear
  var eiL=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.1,0.04),noseMat);
  eiL.position.set(-0.14,0.96,0.24);eiL.rotation.z= 0.28;G.add(eiL);
  var eiR=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.1,0.04),noseMat);
  eiR.position.set( 0.14,0.96,0.24);eiR.rotation.z=-0.28;G.add(eiR);

  // Legs (4 small boxes)
  [[-0.14,0.1, 0.2],[ 0.14,0.1, 0.2],[-0.14,0.1,-0.2],[ 0.14,0.1,-0.2]].forEach(function(l){
    b(0.14,0.24,0.16,bodyMat,l[0],l[1],l[2]);
    b(0.12,0.06,0.18,whiteMat,l[0],0,l[2]+0.02);
  });

  // Tail — group so we can wag it
  var tailGroup=new THREE.Group();
  tailGroup.position.set(0,0.32,-0.34);

  var t1=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.14,0.32),bodyMat);
  t1.position.set(0,0.08,-0.14);tailGroup.add(t1);
  // Tail segment 2 (tip, curling up)

  t2.position.set(0,0.28,-0.28);tailGroup.add(t2);

  var t3=new THREE.Mesh(new THREE.SphereGeometry(0.08,6,5),whiteMat);
  t3.position.set(0,0.44,-0.28);tailGroup.add(t3);
  G.add(tailGroup);

  G._tail=tailGroup;
  G._walkTime=0;
  scene.add(G);
  return G;
}

  for(var m=0;m<MTN_C.length;m++){var mx=nx-MTN_C[m][0],mz=nz-MTN_C[m][1],mr=MTN_C[m][2];if(mx*mx+mz*mz<mr*mr)return true;}
  return false;
}
// ── Indoor collision — matches room layout ──────────────────
// Room: x: -9→+9, z: -8→+8. Spawn (0, FLOOR_Y, 2.5) clear.
function blockedIn(nx,nz){
  // Outer walls
  if(nx<-8.8||nx>8.8||nz>7.8||nz<-7.8) return true;
  // Front door gap (always passable): x -2.5→2.5, z 7.5→8
  // Sofa — back of living room
  if(nx>-3.5&&nx<3.5&&nz>2.4&&nz<4.8) return true;
  // Coffee table — slightly smaller than mesh
  if(nx>-2.2&&nx<2.2&&nz>0.2&&nz<2.3) return true;
  // Armchair
  if(nx>-3.8&&nx<-1.3&&nz>-0.6&&nz<1.7) return true;
  // Divider wall left (x≈-3, z<-0.5)
  if(nx>-3.2&&nx<-2.8&&nz<-0.5) return true;
  // Divider wall right (x≈3, z<-2)
  if(nx>2.8&&nx<3.2&&nz<-2.0) return true;
  // Bed (back-left bedroom)
  if(nx<-3.8&&nx>-8.4&&nz>-5.8&&nz<-0.2) return true;
  // Wardrobe
  if(nx<-5.8&&nz<-5.6) return true;
  // Bookshelf
  if(nx<-6.6&&nz>-3.0&&nz<-0.8) return true;
  // Fireplace
  if(nx<-3.8&&nz<-6.5) return true;
  // Kitchen counter (right back)
  if(nx>4.5&&nz<-5.4) return true;
  // Dining table
  if(nx>3.3&&nx<7.8&&nz>-4.2&&nz<-1.6) return true;
  // Floor lamp (just a small bump)
  if(nx<-7.0&&nx>-8.2&&nz>2.4&&nz<3.6) return true;
  // Pond
  if(nx>-1.4&&nx<1.4&&nz>-1.4&&nz<1.4) return true;
  return false;
}
function tryMove(pos,mx,mz,speed,dt,blockFn){
  var nx=pos.x+mx*speed*dt,nz=pos.z+mz*speed*dt;
  nx=Math.max(-BOUND,Math.min(BOUND,nx));nz=Math.max(-BOUND,Math.min(BOUND,nz));
  if(!blockFn(nx,nz)){pos.x=nx;pos.z=nz;return;}
  var nx2=Math.max(-BOUND,Math.min(BOUND,pos.x+mx*speed*dt));
  if(!blockFn(nx2,pos.z)){pos.x=nx2;return;}
  var nz2=Math.max(-BOUND,Math.min(BOUND,pos.z+mz*speed*dt));
  if(!blockFn(pos.x,nz2))pos.z=nz2;
}

// ─────────────────────────────────────────────────────────────
//  LIMB ANIMATION — separated so hug arms never clobber walk legs
// ─────────────────────────────────────────────────────────────
var SWING=0.55;
// Walk legs only (arms driven separately)
function walkLegs(ch,ph){
  var sw=Math.sin(ph)*SWING;
  ch._lLeg.rotation.x=sw;
  ch._rLeg.rotation.x=-sw;
}
// Walk arms only
function walkArms(ch,ph){
  var sw=Math.sin(ph)*SWING;
  ch._lArm.rotation.x=-sw*0.65;
  ch._rArm.rotation.x= sw*0.65;
}
// Full walk (both)
function animLimbs(ch,ph){
  walkLegs(ch,ph);
  walkArms(ch,ph);
}
// Decay all rotations toward 0
function idleLimbs(ch){
  ch._lLeg.rotation.x*=.85; ch._rLeg.rotation.x*=.85;
  ch._lLeg.rotation.z*=.85; ch._rLeg.rotation.z*=.85;
  ch._lArm.rotation.x*=.85; ch._rArm.rotation.x*=.85;
  ch._lArm.rotation.z*=.85; ch._rArm.rotation.z*=.85;
}
// Snap all rotations instantly to 0
function resetLimbs(ch){
  ch._lLeg.rotation.set(0,0,0);
  ch._rLeg.rotation.set(0,0,0);
  ch._lArm.rotation.set(0,0,0);
  ch._rArm.rotation.set(0,0,0);
}

function spawnHeart(scene,x,y,z){
  var types=[{col:0xff4488,emiss:0xff1155,sz:.13},{col:0xff88bb,emiss:0xff4488,sz:.10},{col:0xffdd55,emiss:0xffaa00,sz:.10},{col:0xff99cc,emiss:0xff5599,sz:.12},{col:0xffffff,emiss:0xffccdd,sz:.08}];
  var t=types[Math.floor(Math.random()*types.length)];
  var geo=Math.random()>.4?new THREE.SphereGeometry(t.sz,5,4):new THREE.OctahedronGeometry(t.sz*.9,0);
  var h=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:t.col,emissive:new THREE.Color(t.emiss),emissiveIntensity:2.2,transparent:true,opacity:1.0}));
  h.position.set(x+(Math.random()-.5)*.3,y,z+(Math.random()-.5)*.3);
  scene.add(h);
  var spin=(Math.random()-.5)*4;
  hearts.push({m:h,vy:.9+Math.random()*.5,vx:(Math.random()-.5)*.4,vz:(Math.random()-.5)*.3,spin:spin,t:0,scene:scene});
}
function updateHearts(dt){
  for(var hi=hearts.length-1;hi>=0;hi--){
    var h=hearts[hi];h.t+=dt;h.vy-=dt*0.4;
    h.m.position.y+=h.vy*dt;h.m.position.x+=h.vx*dt;h.m.position.z+=h.vz*dt;
    h.m.rotation.y+=h.spin*dt;h.m.rotation.z+=h.spin*.5*dt;
    var life=h.t/1.5;h.m.material.opacity=Math.max(0,1.0-life*life);
    var sc=h.t<.18?(h.t/.18*1.4):(1.4-life*.8);h.m.scale.setScalar(Math.max(0,sc));
    if(h.t>1.5){h.scene.remove(h.m);hearts.splice(hi,1);}
  }
}

function drawPixelSprite(isFel, frameIdx){
  var S=4, W=32, H=48;

  canvas.width=W*S; canvas.height=H*S;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(isFel){
    // ─ FELICITY: black dress, white collar/bow, long black hair, knee boots ─
    var ll=[12,33], rl=[18,33];

    else if(frameIdx===3){ll=[13,33];rl=[17,33];}
    else if(frameIdx===4){ll=[12,33];rl=[19,33];}

    px(ll[0]-1,ll[1]+3,5,6,'#151010'); px(rl[0]-1,rl[1]+3,5,6,'#151010');

    px(9,26,14,8,'#1a1020'); px(8,29,16,5,'#201228'); px(7,31,18,3,'#1a1020');
    // bodice
    px(11,18,10,10,'#1a1020');
    // collar / bow
    px(13,18,6,2,'#f5f5f8'); px(14,20,4,2,'#e8e0f0'); px(15,22,2,2,'#f5f5f8');
    px(15,20,2,3,'#ddd0ea');
    // arms (hug / hold special)
    var laY=frameIdx===1?19:frameIdx===2?21:frameIdx===3?17:20;
    var raY=frameIdx===1?21:frameIdx===2?19:frameIdx===3?17:20;
    if(frameIdx===4){laY=19;raY=18;}
    px(7,laY,5,9,'#ffd6b0'); px(6,laY+7,5,3,'#ffc9a0');
    px(20,raY,5,9,'#ffd6b0'); px(20,raY+7,5,3,'#ffc9a0');
    if(frameIdx===4){px(20,17,5,6,'#ffd6b0');px(24,18,4,3,'#ffc9a0');}
    if(frameIdx===3){
      px(6,18,6,8,'#ffd6b0');px(20,18,6,8,'#ffd6b0');
      px(5,23,7,3,'#ffc9a0');px(20,23,7,3,'#ffc9a0');

    px(14,14,4,5,'#ffd6b0');
    // head
    px(10,5,12,12,'#ffd6b0'); px(9,7,14,9,'#ffd6b0'); px(10,6,12,11,'#ffd6b0');
    // hair (long black)
    px(10,2,12,5,'#0e0c0a'); px(9,3,14,4,'#0e0c0a');
    px(10,5,12,3,'#0e0c0a'); px(10,6,3,4,'#0e0c0a'); px(19,6,3,4,'#0e0c0a');
    px(8,5,3,18,'#0e0c0a'); px(21,5,3,18,'#0e0c0a');

function buildSpriteChar(scene,isFel){
  var G=new THREE.Group();

  var frames=[
    drawPixelSprite(isFel,0), // idle
    drawPixelSprite(isFel,1), // walk a
    drawPixelSprite(isFel,2), // walk b
    drawPixelSprite(isFel,3), // hug
    drawPixelSprite(isFel,4), // hold hand
  ];

  var mat=new THREE.MeshBasicMaterial({
    map:frames[0],
    transparent:true,
    alphaTest:0.05,
    side:THREE.DoubleSide,
    depthWrite:false
  });

  // Larger plane for the 48x72 Octopath-style sprites (aspect 2:3)
  var mesh=new THREE.Mesh(new THREE.PlaneGeometry(1.6,2.4), mat);
  mesh.position.y=1.2; // feet sit on floor
  G.add(mesh);

  G._sprite=mesh;
  G._frames=frames;
  G._mat=mat;
  G._frameTime=0;
  G._curFrame=0;
  G._stateFrame=0; // forced frame by game state

  // Ground shadow
  var shadowMat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.20,depthWrite:false});
  var shadow=new THREE.Mesh(new THREE.CircleGeometry(0.52,12),shadowMat);
  shadow.rotation.x=-Math.PI/2;
  shadow.position.y=0.01;
  G.add(shadow);

  var dummy=new THREE.Group();
  G._lArm=dummy; G._rArm=dummy; G._lLeg=dummy; G._rLeg=dummy;
  G._isDummy=true;

  scene.add(G);
  return G;
}

// Animate sprite frame — respects forced state frames (hug=3, hold=4)
function updateSpriteAnim(ch, moving, dt){
  if(!ch||!ch._isDummy||!ch._frames)return;

  var stateF=ch._stateFrame||0;

  if(stateF>=3){
    // Hug (3) or Hold Hand (4) state
    if(moving){
      // WALK animation plays even during hug/hold — cycle frames 1↔2
      ch._frameTime+=dt;
      if(ch._frameTime>0.16){
        ch._frameTime=0;
        // Alternate between walk frames 1 and 2
        var nextF=ch._curFrame===1?2:1;
        ch._curFrame=nextF;
        ch._mat.map=ch._frames[nextF];
        ch._mat.needsUpdate=true;
      }
    } else {
      // Stationary — show the state pose (hug/hold frame)
      if(ch._curFrame!==stateF){
        ch._curFrame=stateF;
        ch._mat.map=ch._frames[stateF];
        ch._mat.needsUpdate=true;
      }
    }
    return;
  }

  // Normal idle/walk
  if(moving){
    ch._frameTime+=dt;
    if(ch._frameTime>0.16){
      ch._frameTime=0;
      ch._curFrame=ch._curFrame===1?2:1;
      ch._mat.map=ch._frames[ch._curFrame];
      ch._mat.needsUpdate=true;
    }
  } else {
    if(ch._curFrame!==0){
      ch._curFrame=0;
      ch._mat.map=ch._frames[0];
      ch._mat.needsUpdate=true;
    }
  }
}

// Set sprite to a named state
function setSpriteState(ch, state){
  if(!ch||!ch._isDummy)return;
  // states: 'idle'=0, 'walk'=auto, 'hug'=3, 'hold'=4
  if(state==='hug')  ch._stateFrame=3;
  else if(state==='hold') ch._stateFrame=4;
  else ch._stateFrame=0;
}

// Sprite always faces the camera
function updateSpriteFacing(sprite,cam){
  if(!sprite._sprite)return;
  var cp=cam.position;
  // Compute angle from sprite to camera in WORLD space
  var angle=Math.atan2(cp.x-sprite.position.x, cp.z-sprite.position.z);
  // Counteract parent's Y rotation so sprite always faces camera
  sprite._sprite.rotation.y=angle-sprite.rotation.y;
  // Also ensure sprite is upright (no tilt inherited from parent)
  sprite._sprite.rotation.x=0;
  sprite._sprite.rotation.z=0;
}

function getPHTime(){
  var now=new Date();
  var ph=new Date(now.getTime()+8*3600000);
  return {h:ph.getUTCHours(),m:ph.getUTCMinutes(),s:ph.getUTCSeconds()};
}

function getSkyState(h){
  for(var i=0;i<skyStates.length;i++){
    if(h>=skyStates[i][0]&&h<skyStates[i][1])return skyStates[i];
  }
  return skyStates[0];
}

function lerpColor(a,b,t){
  var ar=(a>>16)&0xff,ag=(a>>8)&0xff,ab2=a&0xff;
  var br=(b>>16)&0xff,bg=(b>>8)&0xff,bb2=b&0xff;
  return ((Math.round(ar+(br-ar)*t)<<16)|(Math.round(ag+(bg-ag)*t)<<8)|(Math.round(ab2+(bb2-ab2)*t)));
}

function applySkyState(from,to,t){
  t=Math.max(0,Math.min(1,t));
  var ei=function(a,b){return a+(b-a)*t;};
  var ec=function(a,b){return lerpColor(a,b,t);};
  OUT.background.setHex(ec(from.bg,to.bg));
  sun.color.setHex(ec(from.sunC,to.sunC)); sun.intensity=ei(from.sunI,to.sunI);
  hemi.color.setHex(ec(from.hSky,to.hSky)); hemi.groundColor.setHex(ec(from.hGrd,to.hGrd)); hemi.intensity=ei(from.hInt,to.hInt);
  OUT.children.forEach(function(c){if(c.isAmbientLight){c.color.setHex(ec(from.ambC,to.ambC));c.intensity=ei(from.ambI,to.ambI);}});
  var nf=ei(from.nf,to.nf);

// Advance tod lerp each frame (called from animate())
function tickTODLerp(dt){
  if(!todActive||!todLerpFrom||!todLerpTo) return;
  todLerpT+=dt;
  var t=Math.min(1,todLerpT/todLerpDur);
  // Ease in-out
  t=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  applySkyState(todLerpFrom,todLerpTo,t);
  if(todLerpT>=todLerpDur) todActive=false;
}

function updateDayNight(){
  // Always update clock display regardless of override
  var pt=getPHTime();
  var hh=pt.h.toString().padStart(2,'0');
  var mm=pt.m.toString().padStart(2,'0');

  if(manualTOD!==null){
    // Manual mode: show badge + real time, don't touch sky (lerp handles it)
    var badge=manualTOD==='day'?'☀️':'🌙';
    timeDisplay.textContent=badge+' '+hh+':'+mm+' PH';
    return;
  }

  // Real-time PH mode
  var h=pt.h,m2=pt.m,hf=h+m2/60;
  var ss=getSkyState(h),next=getSkyState(h+1>=24?0:h+1);
  var frac=Math.max(0,Math.min(1,(hf-ss[0])/(ss[1]-ss[0]||1)));

  OUT.background.setHex(lerpColor(ss[2],next[2],frac));
  sun.color.setHex(lerpColor(ss[3],next[3],frac)); sun.intensity=ss[4]+(next[4]-ss[4])*frac;
  var sa=(hf/24)*Math.PI*2-Math.PI/2;
  sun.position.set(Math.cos(sa)*40,Math.sin(sa)*35,20);
  hemi.color.setHex(lerpColor(ss[5],next[5],frac)); hemi.groundColor.setHex(lerpColor(ss[6],next[6],frac)); hemi.intensity=ss[7]+(next[7]-ss[7])*frac;
  OUT.children.forEach(function(c){if(c.isAmbientLight){c.color.setHex(lerpColor(ss[8],next[8],frac));c.intensity=ss[9]+(next[9]-ss[9])*frac;}});
  var nf=0;

function animate(){
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),.05);
  elapsed+=dt;
  // Smooth day/night manual transition
  tickTODLerp(dt);

  // ── BIRDS ────────────────────────────────────────────────────
  birds.forEach(function(bg){
    bg._t+=dt*.6;
    bg.position.x=bg._cx+Math.cos(bg._t)*bg._cr;
    bg.position.z=bg._cz+Math.sin(bg._t)*bg._cr;
    bg.position.y=11+Math.sin(bg._t*2.2)*1.5+bg._rx;
    bg.rotation.y=-bg._t+Math.PI/2;
    bg.rotation.z=Math.sin(bg._t*3)*.12;
    bg._wL.rotation.z=Math.sin(elapsed*8)*0.45+0.1;
    bg._wR.rotation.z=-Math.sin(elapsed*8)*0.45-0.1;
  });

  // ── FROGS ────────────────────────────────────────────────────
  frogs.forEach(function(fg){
    fg._t+=dt;
    if(fg._t>fg._nextHop){fg._hopT=0;fg._t=0;fg._nextHop=2+Math.random()*3;fg._hx=(Math.random()-.5)*1.2;fg._hz=(Math.random()-.5)*1.2;}
    if(fg._hopT<.5){fg._hopT+=dt*3;var ht=Math.sin(fg._hopT*Math.PI);fg.position.y=.08+ht*.35;fg.position.x=fg._baseX+(fg._hx||0)*(fg._hopT/1.5||0);fg.position.z=fg._baseZ+(fg._hz||0)*(fg._hopT/1.5||0);}
    else{fg.position.y=.08;}
  });

  // ── BUTTERFLIES — Feature #4 ─────────────────────────────────
  butterflies.forEach(function(bf){
    bf.t+=dt*bf.speed;
    // Orbital flight path with gentle bobbing
    bf.g.position.x=bf.cx+Math.cos(bf.t)*bf.r+Math.sin(bf.t*0.7)*0.8;
    bf.g.position.y=bf.cy+Math.sin(bf.t*1.3)*0.5+Math.cos(bf.t*0.5)*0.3;
    bf.g.position.z=bf.cz+Math.sin(bf.t)*bf.r*0.6+Math.cos(bf.t*0.9)*0.6;
    // Face direction of travel
    bf.g.rotation.y=bf.t+Math.PI/2;
    // Wing flap — realistic butterfly flutter (fast up, slow down)
    var flapAngle=Math.abs(Math.sin(elapsed*6+bf.t*2))*1.1-0.15;
    bf.wLp.rotation.y= flapAngle;
    bf.wRp.rotation.y=-flapAngle;
    // Gentle tilt
    bf.g.rotation.z=Math.sin(bf.t*1.2)*.18;
  });

  // ── TULIPS gentle sway — Feature #4 ─────────────────────────
  TULIPS.forEach(function(tl){
    tl.g.rotation.z=Math.sin(elapsed*0.9+tl.idx)*0.04;
    tl.g.rotation.x=Math.sin(elapsed*0.7+tl.idx*1.3)*0.02;
  });

  // ── Hearts ───────────────────────────────────────────────────
  updateHearts(dt);

  // ── Fire flicker ─────────────────────────────────────────────
  fireFlicker+=dt*8;
  fireL.intensity=1.8+Math.sin(fireFlicker)*.5+Math.sin(fireFlicker*1.7)*.18;
  fireMeshes.forEach(function(fm,i){fm.scale.y=.85+Math.sin(fireFlicker*(1.1+i*.25))*.22;fm.rotation.y=elapsed*(2+i);});
  lanternGlows.forEach(function(ll){ll.intensity=.55+Math.sin(elapsed*2.1+ll.position.x)*.08;});
  if(intLight) intLight.intensity=.55+Math.sin(elapsed*1.7)*.10;
  if(kitchenL) kitchenL.intensity=.8+Math.sin(elapsed*1.9)*.08;
  if(interiorWarmLight) interiorWarmLight.intensity=1.0+Math.sin(elapsed*1.3)*.12;
  if(lampGlow) lampGlow.intensity=0.8+Math.sin(elapsed*2.1)*.10;

  // Input — world-space for all modes (camera is fixed world-space in follow mode too)
  var kb=kbIn();
  var rawX=jIn.on?jIn.x:kb.x, rawZ=jIn.on?-jIn.y:kb.y;
  var mx=rawX, mz=rawZ;
  var moving=Math.abs(mx)>.015||Math.abs(mz)>.015;

  if(insideHouse){
    // ══════════════════════════════════════════════════════════
    //  INDOOR — single authoritative animation dispatcher
    //  Rule: each character's limbs are set EXACTLY ONCE per frame
    // ══════════════════════════════════════════════════════════

    // ── Felicity movement & rotation ─────────────────────────
    if(moving && !hugActive){
      iwt+=dt;

      while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;

      inChris.rotation.y=Math.atan2(hDx,hDz);
      inFel.rotation.y  =Math.atan2(-hDx,-hDz);
      // Sprites face camera independently — no override needed (updateSpriteFacing handles it)

      // ── Chris Y during hug
      inChris.position.y = FLOOR_Y + (moving ? Math.abs(Math.sin(iwt*9))*0.04 : Math.abs(Math.sin(elapsed*1.8))*0.018);

      var gcz=(outFel.position.z+outChris.position.z)*0.5;
      var avgRY=(outFel.rotation.y+outChris.rotation.y)*0.5;
      var dTX=gcx+Math.sin(avgRY)*DOG_FOLLOW_DIST;
      var dTZ=gcz+Math.cos(avgRY)*DOG_FOLLOW_DIST;
      var ddx=dTX-outDog.position.x, ddz=dTZ-outDog.position.z;
      var ddist=Math.sqrt(ddx*ddx+ddz*ddz);
      if(ddist>0.3){
        dogWt+=dt;
        var dspd=Math.min(DOG_SPEED*dt,ddist);
        var dnx=outDog.position.x+ddx/ddist*dspd;
        var dnz=outDog.position.z+ddz/ddist*dspd;
        if(!blockedOut(dnx,dnz)){outDog.position.x=dnx;outDog.position.z=dnz;}
        else if(!blockedOut(dnx,outDog.position.z)){outDog.position.x=dnx;}
        else if(!blockedOut(outDog.position.x,dnz)){outDog.position.z=dnz;}
        var dA=Math.atan2(ddx,ddz)+Math.PI,dDA=dA-outDog.rotation.y;
        while(dDA>Math.PI)dDA-=Math.PI*2; while(dDA<-Math.PI)dDA+=Math.PI*2;
        outDog.rotation.y+=dDA*Math.min(1,dt*8);
        outDog.position.y=Math.abs(Math.sin(dogWt*8))*0.05;
        // Walk leg swing
        outDog._legFL.rotation.x= Math.sin(dogWt*9)*0.5;
        outDog._legFR.rotation.x=-Math.sin(dogWt*9)*0.5;
        outDog._legBL.rotation.x=-Math.sin(dogWt*9)*0.5;
        outDog._legBR.rotation.x= Math.sin(dogWt*9)*0.5;
        outDog._tail.rotation.z=Math.sin(dogWt*12)*0.6;
        outDog._earL.rotation.z=0.25+Math.sin(dogWt*8)*0.08;
        outDog._earR.rotation.z=-0.25+Math.sin(dogWt*8)*0.08;
      } else {
        dogWt=0;
        outDog.position.y=Math.abs(Math.sin(elapsed*1.0))*0.02;
        // Tail wag while idle
        outDog._tail.rotation.z=Math.sin(elapsed*5)*0.5;
        outDog._legFL.rotation.x=0; outDog._legFR.rotation.x=0;
        outDog._legBL.rotation.x=0; outDog._legBR.rotation.x=0;
        outDog._earL.rotation.z=0.25; outDog._earR.rotation.z=-0.25;
      }
    })();
    // Pop-in animation for placed items
    for(var pi2=placedItems.length-1;pi2>=0;pi2--){
      var pm=placedItems[pi2];
      if(pm._popT<1){
        pm._popT+=dt*3;
        var sc=Math.min(1,pm._popT);
        // Overshoot spring
        var spring=sc<0.7?(sc/0.7):(1+(1-sc/1)*0.3*Math.sin((sc-0.7)/0.3*Math.PI));
        pm.scale.setScalar(Math.max(0,spring));
      }
    }
    // ── FIREFLIES (night only) ─────────────────────────────
    if(fireflyNightFrac > 0.05){
      for(var _ffi=0;_ffi<fireflyMeshes.length;_ffi++){
        var _ff = fireflyData[_ffi];
        var _fm = fireflyMeshes[_ffi];
        // Drift slowly
        _ff.baseX += _ff.driftX;
        _ff.baseZ += _ff.driftZ;
        // Bounce back if too far
        if(Math.abs(_ff.baseX)>30 || Math.abs(_ff.baseZ+14)>30){
          _ff.driftX *= -1; _ff.driftZ *= -1;
        }
        // Gentle floating
        _ff.phase += dt * _ff.speed;
        _fm.position.x = _ff.baseX + Math.sin(_ff.phase)*0.4;
        _fm.position.y = _ff.baseY + Math.sin(_ff.phase*1.3)*0.35;
        _fm.position.z = _ff.baseZ + Math.cos(_ff.phase*0.8)*0.3;
        // Blink on/off
        _ff.blinkPhase += dt * _ff.blinkSpeed;
        var blinkVal = (Math.sin(_ff.blinkPhase)*0.5+0.5);
        blinkVal = Math.pow(blinkVal, 3); // sharper blink
        var ffOpacity = fireflyNightFrac * blinkVal * 0.95;
        _fm.material.opacity = ffOpacity;
        _fm.material.emissiveIntensity = 2.5 + blinkVal * 2.5;
        _fm.visible = fireflyNightFrac > 0.05;
      }
    } else {
      for(var _ffi2=0;_ffi2<fireflyMeshes.length;_ffi2++){
        fireflyMeshes[_ffi2].visible = false;
      }
    }

    // ── SUN RAYS PULSE ───────────────────────────────────────
    // Rays are hidden at night, pulse softly during day
    var dayFrac=Math.max(0,1-fireflyNightFrac);
    for(var sri=0;sri<sunRayMeshes.length;sri++){
      var sr=sunRayMeshes[sri];
      sr.phase+=dt*sr.speed;
      // Gentle opacity pulse — never too bright
      var pulse=0.65+Math.sin(sr.phase)*0.35;
      sr.mesh.material.opacity=sr.baseOpacity*pulse*dayFrac*0.85;
      // Slowly drift/rotate each ray for natural movement
      sr.mesh.rotation.z+=dt*0.012*Math.sin(sr.phase*0.4);
    }

    renderer.render(OUT,outCam);
    updateLabel(lblF,outFel,3.5,outCam);
    updateLabel(lblC,outChris,3.9,outCam);
  }
}

// ─────────────────────────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────────────────────────
window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  outCam.aspect=W/H;outCam.updateProjectionMatrix();
  inCam.aspect=W/H;
  inCam.updateProjectionMatrix();
  renderer.setSize(W,H);
});

// ─────────────────────────────────────────────────────────────
//  START — called only after Play button is clicked
// ─────────────────────────────────────────────────────────────
function startGame(){
  lbar.style.width='100%';
  // Interior is 100% procedural — buildCozyInterior() already ran at startup.
  // No GLB loading needed; avoids all ProgressEvent / 404 errors.
  setTimeout(function(){
    clearInterval(lint);
    var ld=document.getElementById('ld');
    if(ld){ld.classList.add('fade');setTimeout(function(){if(ld.parentNode)ld.parentNode.removeChild(ld);},600);}
    animate();
  },400);
}

// ─────────────────────────────────────────────────────────────
//  Pre-load progress bar starts immediately on page open
//  but game only renders after Play is clicked
// ─────────────────────────────────────────────────────────────
// (lint interval already started at top of script)

// ─────────────────────────────────────────────────────────────
//  FULLSCREEN BUTTON
// ─────────────────────────────────────────────────────────────
(function(){
  var fsBtn = document.getElementById('fs-btn');
  var isFS = false;

  function enterFS(){
    var el = document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
    else if(el.msRequestFullscreen) el.msRequestFullscreen();
    // Ask for landscape on mobile
    if(screen.orientation && screen.orientation.lock){
      screen.orientation.lock('landscape').catch(function(){});
    }
  }
  function exitFS(){
    if(document.exitFullscreen) document.exitFullscreen();
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if(document.mozCancelFullScreen) document.mozCancelFullScreen();
    else if(document.msExitFullscreen) document.msExitFullscreen();
  }

  function onFSChange(){
    var inFull = !!(document.fullscreenElement||document.webkitFullscreenElement||
                   document.mozFullScreenElement||document.msFullscreenElement);
    isFS = inFull;
    fsBtn.textContent = inFull ? '✕' : '⛶';
    fsBtn.title = inFull ? 'Exit Fullscreen' : 'Fullscreen';
    // Refit renderer
    setTimeout(function(){
      W = window.innerWidth; H = window.innerHeight;
      outCam.aspect = W/H; outCam.updateProjectionMatrix();
      inCam.aspect  = W/H; inCam.updateProjectionMatrix();
      renderer.setSize(W, H);
    }, 120);
  }

  fsBtn.addEventListener('click', function(){
    if(!isFS) enterFS(); else exitFS();
  });

  document.addEventListener('fullscreenchange', onFSChange);
  document.addEventListener('webkitfullscreenchange', onFSChange);
  document.addEventListener('mozfullscreenchange', onFSChange);
  document.addEventListener('MSFullscreenChange', onFSChange);
})();

</script>
